<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE:Ignite · 中控端</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 16px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        h1 { font-size: 1.6rem; }
        .btn {
            background: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #0d5cbb; }
        .btn-outline { background: #eef2f6; }
        .btn-outline:hover { background: #e2e6ea; }
        .filter-bar {
            background: white;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .group-chip {
            padding: 6px 16px;
            border-radius: 40px;
            background: #eef2f6;
            cursor: pointer;
        }
        .group-chip.active { background: #1a73e8; color: white; }
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 12px 20px;
            text-align: center;
            flex: 1;
            min-width: 80px;
            cursor: pointer;
            transition: 0.1s;
        }
        .stat-card.active-filter { background: #e3f2fd; box-shadow: 0 0 0 2px #1a73e8; }
        .stat-card:hover { background: #e9ecef; }
        .table-wrapper { background: white; border-radius: 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th {
            background: #1e2a3e;
            color: white;
            padding: 12px 8px;
            text-align: center;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
            text-align: center;
        }
        .color-selector { display: flex; justify-content: center; gap: 6px; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
        .dot-green { background: #4caf50; }
        .dot-yellow { background: #ffc107; }
        .dot-red { background: #f44336; }
        .dot-black { background: #2c3e2f; }
        .rbc-control { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        .rbc-btn {
            width: 36px;
            height: 32px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            background: #eef2f6;
            font-weight: bold;
        }
        .checkbox { width: 20px; height: 20px; cursor: pointer; }
        .warning-row { background-color: #ffebee; }
        .news-input {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background: white;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            align-items: center;
        }
        .news-input input { flex: 2; padding: 10px 16px; border-radius: 40px; border: 1px solid #ddd; }
        .save-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e2a3e;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 12px;
        }
        .connected { background: #e8f5e9; color: #2e7d32; }
        .disconnected { background: #ffebee; color: #d32f2f; }
        .clear-filter { margin-left: 12px; font-size: 0.8rem; background: #e9ecef; padding: 4px 12px; border-radius: 40px; cursor: pointer; }
        /* 经济状态栏 */
        .economy-bar {
            background: #2c3e50;
            color: white;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .economy-status {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .economy-label {
            font-weight: 600;
            background: #1e2a3e;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .economy-text {
            font-size: 1rem;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 40px;
        }
        .economy-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .economy-btn {
            background: #3a546d;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .economy-btn:hover { background: #4a6a8a; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔥 RE:Ignite · 中控端 <span id="statusBadge" class="status disconnected">连接中...</span></h1>
        <div><button class="btn btn-outline" id="resetAllBtn">🔄 重置所有</button></div>
    </div>

    <!-- 实时经济状态 (公告栏) -->
    <div class="economy-bar">
        <div class="economy-status">
            <span class="economy-label">📊 经济状况</span>
            <span class="economy-text" id="economyStatusText">正常 · 标准汇率</span>
        </div>
        <div class="economy-buttons">
            <button class="economy-btn" data-economy="normal">💰 正常</button>
            <button class="economy-btn" data-economy="inflation">📈 通货膨胀 (R币贬值)</button>
            <button class="economy-btn" data-economy="deflation">📉 通货紧缩 (R币升值)</button>
            <button class="economy-btn" data-economy="custom">✏️ 自定义</button>
        </div>
    </div>

    <div class="news-input">
        <span>📢 快报广播：</span>
        <input type="text" id="newsInput" placeholder="例：霍尔木兹风暴！超市涨价！">
        <button class="btn btn-primary" id="sendNewsBtn">发送</button>
    </div>

    <div class="filter-bar">
        <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <span>📌 小组：</span>
            <span class="group-chip active" data-group="all">全部</span>
            <span class="group-chip" data-group="A组">A组</span>
            <span class="group-chip" data-group="B组">B组</span>
            <span class="group-chip" data-group="C组">C组</span>
            <span class="group-chip" data-group="D组">D组</span>
        </div>
        <div style="margin-left: auto;">
            <span id="clearFilterBtn" class="clear-filter">✖ 清除颜色筛选</span>
        </div>
    </div>

    <div class="stats-grid" id="statsPanel"></div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>玩家</th><th>组</th><th>手环</th><th>颜色</th><th>R币</th><th>站1</th><th>站2</th><th>站3</th><th>站4</th><th>进度</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
<div class="save-hint" id="saveHint">✓ 已同步云端</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function(){
        // ========== 配置 ==========
        const SUPABASE_URL = "https://vycanjsrmxdlnxauqvtc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Y2FuanNybXhkbG54YXVxdnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mjk2ODcsImV4cCI6MjA5MzIwNTY4N30.NAGbSNYe_7-mcvvpFeBODeHEM59IHqoWKY-RaX5jU6c";   // ⚠️ 请替换
        // =========================

        let supabaseClient;
        if (window.__supabaseAdminClient) {
            supabaseClient = window.__supabaseAdminClient;
        } else {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            window.__supabaseAdminClient = supabaseClient;
        }

        let rawPlayers = [];
        let uniquePlayers = [];
        let currentGroup = "all";
        let currentColorFilter = null;   // 'green', 'yellow', 'red', 'black', 'warn'

        function updateStatus(connected) {
            const badge = document.getElementById('statusBadge');
            if (badge) {
                badge.className = `status ${connected ? 'connected' : 'disconnected'}`;
                badge.innerText = connected ? '● 已连接云端' : '● 离线';
            }
        }

        function deduplicatePlayers(players) {
            const map = new Map();
            for (const p of players) {
                const key = `${p.name}|${p.group_name}`;
                if (!map.has(key)) map.set(key, p);
                else console.warn(`重复: ${p.name} (${p.group_name}) id=${p.id}`);
            }
            return Array.from(map.values());
        }

        async function loadPlayers() {
            const { data, error } = await supabaseClient
                .from('players')
                .select('*')
                .order('group_name', { ascending: true })
                .order('hand_code', { ascending: true });
            if (error) {
                console.error('加载失败:', error);
                updateStatus(false);
                return;
            }
            rawPlayers = data || [];
            uniquePlayers = deduplicatePlayers(rawPlayers);
            updateStatus(true);
            renderUI();
        }

        async function updatePlayer(id, updates) {
            const { error } = await supabaseClient.from('players').update(updates).eq('id', id);
            if (error) {
                console.error('更新失败:', error);
                alert('更新失败: ' + error.message);
            } else {
                const hint = document.getElementById('saveHint');
                hint.classList.add('show');
                setTimeout(() => hint.classList.remove('show'), 1000);
                await loadPlayers();
            }
        }

        window.changeRbc = (player, delta) => {
            const newRbc = Math.max(0, player.rbc + delta);
            updatePlayer(player.id, { rbc: newRbc });
        };

        window.setColor = (player, color) => {
            updatePlayer(player.id, { color });
        };

        window.toggleStation = (player, station) => {
            updatePlayer(player.id, { [station]: !player[station] });
        };

        function getProgress(p) {
            const done = (p.s1?1:0)+(p.s2?1:0)+(p.s3?1:0)+(p.s4?1:0);
            return Math.round(done/4*100);
        }

        async function sendNews() {
            const input = document.getElementById('newsInput');
            const content = input.value.trim();
            if(content) {
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                const { error } = await supabaseClient.from('news').insert([{ content, time: timeStr }]);
                if (error) alert('发送失败: ' + error.message);
                else {
                    alert('快报已发送！');
                    input.value = '';
                }
            }
        }

        async function resetAll() {
            if(confirm('重置所有玩家？')) {
                for (let p of uniquePlayers) {
                    await updatePlayer(p.id, { color: 'green', rbc: 10, s1: false, s2: false, s3: false, s4: false });
                }
                await loadPlayers();
            }
        }

        // 经济状态预设
        const economyPresets = {
            normal: '💰 正常 · 标准汇率',
            inflation: '📈 通货膨胀 · 物价上涨 (R币购买力下降)',
            deflation: '📉 通货紧缩 · 物价下跌 (R币更值钱)'
        };
        function setEconomyStatus(text) {
            const statusSpan = document.getElementById('economyStatusText');
            if (statusSpan) statusSpan.innerText = text;
            // 也可以将经济状态存到 localStorage 或 broadcast 到玩家端，但用户只要求中控显示
        }
        function initEconomyBar() {
            document.querySelectorAll('.economy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.getAttribute('data-economy');
                    if (val === 'custom') {
                        const customText = prompt('请输入自定义经济状况文字:', document.getElementById('economyStatusText').innerText);
                        if (customText) setEconomyStatus(customText);
                    } else if (economyPresets[val]) {
                        setEconomyStatus(economyPresets[val]);
                    }
                });
            });
        }

        // 统计卡片及筛选
        function renderStatsAndFilters() {
            const stats = { total: uniquePlayers.length, green:0, yellow:0, red:0, black:0, warn:0 };
            for (let p of uniquePlayers) {
                if(p.color === 'green') stats.green++;
                else if(p.color === 'yellow') stats.yellow++;
                else if(p.color === 'red') stats.red++;
                else if(p.color === 'black') stats.black++;
                if(p.rbc < 5) stats.warn++;
            }
            const panel = document.getElementById('statsPanel');
            panel.innerHTML = `
                <div class="stat-card ${currentColorFilter === null ? 'active-filter' : ''}" data-filter="all">👥 ${stats.total}</div>
                <div class="stat-card" data-filter="green">🟢 ${stats.green}</div>
                <div class="stat-card" data-filter="yellow">🟡 ${stats.yellow}</div>
                <div class="stat-card" data-filter="red">🔴 ${stats.red}</div>
                <div class="stat-card" data-filter="black">⚫ ${stats.black}</div>
                <div class="stat-card" data-filter="warn">⚠️ ${stats.warn}</div>
            `;
            document.querySelectorAll('.stat-card').forEach(card => {
                card.addEventListener('click', () => {
                    const filter = card.getAttribute('data-filter');
                    if (filter === 'all') currentColorFilter = null;
                    else currentColorFilter = filter;
                    renderUI();
                });
            });
        }

        function getFilteredPlayers() {
            let filtered = [...uniquePlayers];
            if (currentGroup !== "all") {
                filtered = filtered.filter(p => p.group_name === currentGroup);
            }
            if (currentColorFilter) {
                if (currentColorFilter === 'warn') {
                    filtered = filtered.filter(p => p.rbc < 5);
                } else {
                    filtered = filtered.filter(p => p.color === currentColorFilter);
                }
            }
            return filtered;
        }

        function renderUI() {
            renderStatsAndFilters();
            document.querySelectorAll('.group-chip').forEach(chip => {
                if (chip.getAttribute('data-group') === currentGroup) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            document.querySelectorAll('.stat-card').forEach(card => {
                const filterVal = card.getAttribute('data-filter');
                if ((currentColorFilter === null && filterVal === 'all') || 
                    (currentColorFilter !== null && filterVal === currentColorFilter)) {
                    card.classList.add('active-filter');
                } else {
                    card.classList.remove('active-filter');
                }
            });

            const filtered = getFilteredPlayers();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            filtered.forEach(p => {
                const row = tbody.insertRow();
                if(p.rbc < 5) row.classList.add('warning-row');
                row.insertCell(0).innerText = p.name;
                row.insertCell(1).innerText = p.group_name;
                row.insertCell(2).innerText = p.hand_code;

                // 颜色选择器
                const colorCell = row.insertCell(3);
                const colors = [
                    {v:'green',c:'dot-green'}, {v:'yellow',c:'dot-yellow'},
                    {v:'red',c:'dot-red'}, {v:'black',c:'dot-black'}
                ];
                const cDiv = document.createElement('div');
                cDiv.className = 'color-selector';
                colors.forEach(c => {
                    const dot = document.createElement('div');
                    dot.className = `color-dot ${c.c}`;
                    if(p.color === c.v) dot.style.border = '2px solid #333';
                    dot.addEventListener('click', (function(player, color) {
                        return function() { window.setColor(player, color); };
                    })(p, c.v));
                    cDiv.appendChild(dot);
                });
                colorCell.appendChild(cDiv);

                // R币控制区：统一灰色按钮
                const rbcCell = row.insertCell(4);
                const rbDiv = document.createElement('div');
                rbDiv.className = 'rbc-control';
                rbDiv.innerHTML = `
                    <button class="rbc-btn">-5</button>
                    <button class="rbc-btn">-2</button>
                    <button class="rbc-btn">-1</button>
                    <span style="min-width:40px;text-align:center;font-weight:bold;">${p.rbc}</span>
                    <button class="rbc-btn">+1</button>
                    <button class="rbc-btn">+2</button>
                    <button class="rbc-btn">+5</button>
                `;
                const btns = rbDiv.children;
                btns[0].onclick = () => window.changeRbc(p, -5);
                btns[1].onclick = () => window.changeRbc(p, -2);
                btns[2].onclick = () => window.changeRbc(p, -1);
                btns[4].onclick = () => window.changeRbc(p, 1);
                btns[5].onclick = () => window.changeRbc(p, 2);
                btns[6].onclick = () => window.changeRbc(p, 5);
                rbcCell.appendChild(rbDiv);

                // 站复选框
                const createCheck = (checked, station) => {
                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.checked = checked;
                    cb.addEventListener('change', (function(player, station) {
                        return function() { window.toggleStation(player, station); };
                    })(p, station));
                    return cb;
                };
                row.insertCell(5).appendChild(createCheck(p.s1, 's1'));
                row.insertCell(6).appendChild(createCheck(p.s2, 's2'));
                row.insertCell(7).appendChild(createCheck(p.s3, 's3'));
                row.insertCell(8).appendChild(createCheck(p.s4, 's4'));
                row.insertCell(9).innerHTML = `<span style="background:#e9ecef;padding:4px 8px;border-radius:40px;">${getProgress(p)}%</span>`;
            });
        }

        function setupRealtime() {
            supabaseClient.channel('players-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadPlayers())
                .subscribe();
        }

        document.getElementById('sendNewsBtn')?.addEventListener('click', sendNews);
        document.getElementById('resetAllBtn')?.addEventListener('click', resetAll);
        document.getElementById('clearFilterBtn')?.addEventListener('click', () => {
            currentColorFilter = null;
            renderUI();
        });
        document.querySelectorAll('.group-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                currentGroup = chip.getAttribute('data-group');
                renderUI();
            });
        });

        loadPlayers();
        setupRealtime();
        initEconomyBar();
    })();
</script>
</body>
</html>
