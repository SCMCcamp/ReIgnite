<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RE:Ignite · 玩家端</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #e8501a;
            --brand-dim: rgba(232,80,26,0.15);
            --brand-glow: rgba(232,80,26,0.3);
            --surface: #0f1117;
            --surface-2: #161b26;
            --surface-3: #1e2435;
            --surface-4: #252d3f;
            --text-1: #f0f2f8;
            --text-2: #8a94a8;
            --text-3: #5a6377;
            --border: rgba(255,255,255,0.07);
            --border-2: rgba(255,255,255,0.12);
            --gold: #f5a623;
            --gold-dim: rgba(245,166,35,0.12);
            --green: #34d399;
            --green-dim: rgba(52,211,153,0.12);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.12);
            --blue: #60a5fa;
            --blue-dim: rgba(96,165,250,0.1);
            --orange: #f97316;      /* 连接中颜色 */
            --orange-dim: rgba(249,115,22,0.15);
        }

        [data-theme="light"] {
            --surface: #f4f5f7;
            --surface-2: #ffffff;
            --surface-3: #f0f1f4;
            --surface-4: #e4e6ec;
            --text-1: #111827;
            --text-2: #4b5563;
            --text-3: #9ca3af;
            --border: rgba(0,0,0,0.08);
            --border-2: rgba(0,0,0,0.14);
            --gold: #d97706;
            --gold-dim: rgba(217,119,6,0.1);
            --green: #059669;
            --green-dim: rgba(5,150,105,0.1);
            --red: #dc2626;
            --red-dim: rgba(220,38,38,0.08);
            --blue: #2563eb;
            --blue-dim: rgba(37,99,235,0.08);
            --orange: #ea580c;
            --orange-dim: rgba(234,88,12,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--surface);
            color: var(--text-1);
            padding: 20px 16px 40px;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(232,80,26,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(96,165,250,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container { max-width: 740px; margin: 0 auto; position: relative; z-index: 1; }

        /* 液态玻璃效果 */
        .info-card, .player-card, .stock-card, .selector-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 60%, rgba(96,165,250,0.04) 100%);
            backdrop-filter: blur(16px) saturate(1.5);
            -webkit-backdrop-filter: blur(16px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.1), 0 8px 24px rgba(0,0,0,0.2);
        }
        [data-theme="light"] .info-card,
        [data-theme="light"] .player-card,
        [data-theme="light"] .stock-card,
        [data-theme="light"] .selector-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.4) 60%, rgba(96,165,250,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), inset 0 -1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; color: var(--text-1); }
        .logo-text span { color: var(--brand); }
        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        
        /* 状态指示灯样式 */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 14px 4px 10px;
            border-radius: 40px;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1px solid;
            background: var(--surface-3);
            transition: all 0.2s ease;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        /* 连接中状态 (橙色 + 慢速脉冲) */
        .status-connecting {
            border-color: rgba(249,115,22,0.5);
            color: var(--orange);
        }
        .status-connecting .status-dot {
            background: var(--orange);
            animation: connectingPulse 1.2s ease-in-out infinite;
            box-shadow: 0 0 4px var(--orange);
        }
        /* 已连接状态 (绿色 + 简洁常亮) */
        .status-connected {
            border-color: rgba(52,211,153,0.4);
            color: var(--green);
        }
        .status-connected .status-dot {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: none;
        }
        /* 失联状态 (红色 + 快速闪烁警告) */
        .status-disconnected {
            border-color: rgba(248,113,113,0.5);
            color: var(--red);
        }
        .status-disconnected .status-dot {
            background: var(--red);
            animation: disconnectedBlink 0.6s step-start infinite;
            box-shadow: 0 0 8px var(--red);
        }
        
        @keyframes connectingPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes disconnectedBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 快报/经济圆点脉冲 */
        .info-card-label .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); animation: idlePulse 2s infinite; }
        .economy-card .info-card-label .dot { background: var(--gold); }
        @keyframes idlePulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes urgentPulse { 0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(96,165,250,0.7); } 50% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 0 4px rgba(96,165,250,0.4); } }
        @keyframes urgentPulseGold { 0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(245,166,35,0.8); } 50% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 0 4px rgba(245,166,35,0.4); } }
        .pulse-urgent { animation: urgentPulse 0.6s ease-in-out 3 !important; }
        .pulse-urgent-gold { animation: urgentPulseGold 0.6s ease-in-out 3 !important; }

        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        @media (max-width: 500px) { .info-row { grid-template-columns: 1fr; } }
        .info-card { border-radius: 20px; padding: 16px 18px; position: relative; overflow: hidden; }
        .info-card-label { display: flex; align-items: center; gap: 8px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-3); margin-bottom: 10px; }
        .info-card-content { font-size: 0.9rem; line-height: 1.55; color: var(--text-1); transition: all 0.2s; }
        .info-card-time { font-size: 0.65rem; color: var(--text-3); margin-top: 10px; text-align: right; }

        /* 玩家卡片 & 低生命值特效 */
        .player-card { border-radius: 20px; padding: 24px; margin-bottom: 16px; position: relative; transition: all 0.3s ease; }
        .player-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1;
            color: var(--text-1);
            transition: all 0.3s ease;
            display: inline-block;
        }
        .name-effect-yellow { text-shadow: 0 0 4px rgba(255,193,7,0.6); animation: subtleShake 0.2s ease-in-out 0s 2; }
        .name-effect-orange { text-shadow: 0 0 6px rgba(255,152,0,0.9); animation: subtleShake 0.25s ease-in-out 0s 3; filter: blur(0.3px); }
        .name-effect-red { text-shadow: 0 0 10px rgba(244,67,54,1); animation: subtleShake 0.3s ease-in-out infinite; filter: blur(0.5px); position: relative; }
        .name-effect-red::after { content: '⚡'; position: absolute; right: -20px; top: 0; opacity: 0.7; animation: flickerDanger 0.3s infinite; }
        .name-effect-black { text-shadow: 0 0 8px rgba(0,0,0,0.8), 0 0 2px rgba(120,120,120,0.5); animation: violentShake 0.15s ease-in-out infinite; filter: blur(1px); opacity: 0.85; letter-spacing: -0.5px; }
        .name-effect-black::before { content: '💀'; position: absolute; left: -24px; top: 4px; font-size: 1.2rem; filter: blur(0); animation: ghostFade 1s infinite; }

        @keyframes subtleShake { 0% { transform: translateX(0); } 25% { transform: translateX(-1.5px); } 75% { transform: translateX(1.5px); } 100% { transform: translateX(0); } }
        @keyframes violentShake { 0% { transform: translateX(0) rotate(0deg); } 20% { transform: translateX(-2px) rotate(-1deg); } 40% { transform: translateX(2px) rotate(1deg); } 60% { transform: translateX(-1px) rotate(-0.5deg); } 80% { transform: translateX(1px) rotate(0.5deg); } 100% { transform: translateX(0) rotate(0); } }
        @keyframes flickerDanger { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }
        @keyframes ghostFade { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.1; } }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
        .stat-box { background: rgba(0,0,0,0.25); backdrop-filter: blur(4px); border-radius: 14px; padding: 12px; text-align: center; border: 1px solid var(--border); }
        [data-theme="light"] .stat-box { background: rgba(255,255,255,0.5); backdrop-filter: blur(4px); }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-3); margin-bottom: 8px; }
        .stat-value { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; line-height: 1; color: var(--text-1); }
        .rbc-value { color: var(--gold); }
        .color-orb { width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 6px; border: 2px solid rgba(255,255,255,0.2); transition: box-shadow 0.2s; }
        .orb-green { background: #4caf50; animation: hb-green 0.8s ease-in-out infinite; }
        .orb-yellow { background: #ffc107; animation: hb-yellow 1.2s ease-in-out infinite; }
        .orb-orange { background: #ff9800; animation: hb-orange 1.7s ease-in-out infinite; }
        .orb-red { background: #f44336; animation: hb-red 2.5s ease-in-out infinite; }
        .orb-black { background: #546e7a; animation: none; box-shadow: none; }
        @keyframes hb-green { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76,175,80,0.4); } 14% { transform: scale(1.22); box-shadow: 0 0 0 6px rgba(76,175,80,0.2); } 28% { transform: scale(1); } 42% { transform: scale(1.15); } 70% { transform: scale(1); } 100% { transform: scale(1); } }
        @keyframes hb-yellow { 0% { transform: scale(1); } 20% { transform: scale(1.18); } 40% { transform: scale(1); } 60% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes hb-orange { 0% { transform: scale(1); } 25% { transform: scale(1.12); } 50% { transform: scale(1); } 75% { transform: scale(1.06); } 100% { transform: scale(1); } }
        @keyframes hb-red { 0% { transform: scale(1); } 30% { transform: scale(1.08); } 60% { transform: scale(1); } 100% { transform: scale(1); } }

        .warning-banner { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); border-radius: 12px; padding: 10px; margin-top: 16px; text-align: center; font-size: 0.8rem; color: var(--red); font-weight: 600; }

        .stock-card { border-radius: 24px; padding: 22px; margin-top: 8px; }
        .stock-title { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text-1); }
        .stock-title em { color: var(--gold); font-style: normal; }
        .stock-price { font-family: 'Rajdhani', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--gold); text-align: right; }
        canvas { max-height: 120px; width: 100%; margin-top: 12px; }

        .selector-card { border-radius: 20px; padding: 28px 24px; margin-bottom: 32px; text-align: center; }
        select, .btn-primary { width: 100%; padding: 12px; border-radius: 12px; background: var(--surface-3); border: 1px solid var(--border-2); color: var(--text-1); font-size: 0.9rem; margin-top: 12px; cursor: pointer; }
        .btn-primary { background: var(--brand); color: white; border: none; font-weight: 700; }
        .footer { text-align: center; font-size: 0.65rem; color: var(--text-3); margin-top: 24px; }
        .theme-toggle { background: var(--surface-3); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <div class="logo-text">RE<span>:</span>Ignite</div>
            <div id="statusBadge" class="status-pill status-connecting">
                <span class="status-dot"></span>
                连接中…
            </div>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <div class="header-sub">每一个决定都将影响最终结果</div>
        </div>
    </div>
    <div class="info-row">
        <div class="info-card news-card"><div class="info-card-label"><span class="dot" id="newsDot"></span>RE:Ignite 快报</div><div class="info-card-content" id="newsContent">加载中…</div><div class="info-card-time" id="newsTime"></div></div>
        <div class="info-card economy-card"><div class="info-card-label"><span class="dot" id="economyDot"></span>经济动态</div><div class="info-card-content" id="economyContent">加载中…</div><div class="info-card-time" id="economyTime"></div></div>
    </div>
    <div id="mainContent"></div>
    <div class="stock-card"><div class="stock-title">RE<em>:</em>Set 股</div><div class="stock-price" id="currentPrice">--</div><canvas id="priceChart" height="130"></canvas><div class="stock-note" style="font-size:0.65rem; text-align:center; margin-top:8px;">中控发布经济动态或随机波动时自动更新</div></div>
    <div class="footer">数据实时同步<span style="display:inline-block; width:4px; height:4px; background:var(--brand); border-radius:50%; margin:0 6px; vertical-align:middle;"></span>无需刷新页面</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
    // --- 主题切换 ---
    const btn = document.getElementById('themeToggle');
    const saved = localStorage.getItem('reignite_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    btn.textContent = saved === 'dark' ? '☀️' : '🌙';
    btn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('reignite_theme', next);
        btn.textContent = next === 'dark' ? '☀️' : '🌙';
    });

    const SUPABASE_URL = "https://vycanjsrmxdlnxauqvtc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Y2FuanNybXhkbG54YXVxdnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mjk2ODcsImV4cCI6MjA5MzIwNTY4N30.NAGbSNYe_7-mcvvpFeBODeHEM59IHqoWKY-RaX5jU6c";
    let supabaseClient = window.__supabasePlayerClient || (window.__supabasePlayerClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

    let allPlayers = [], currentPlayer = null, priceHistory = [5], chart = null;

    // 连接状态管理
    const statusBadge = document.getElementById('statusBadge');
    function setConnectionState(state) { // 'connecting', 'connected', 'disconnected'
        statusBadge.classList.remove('status-connecting', 'status-connected', 'status-disconnected');
        if (state === 'connected') {
            statusBadge.classList.add('status-connected');
            statusBadge.innerHTML = '<span class="status-dot"></span>已连接';
        } else if (state === 'disconnected') {
            statusBadge.classList.add('status-disconnected');
            statusBadge.innerHTML = '<span class="status-dot"></span>失联';
        } else {
            statusBadge.classList.add('status-connecting');
            statusBadge.innerHTML = '<span class="status-dot"></span>连接中…';
        }
    }
    setConnectionState('connecting');

    // 股票图表
    function renderStockChart() {
        const ctx = document.getElementById('priceChart').getContext('2d');
        if (chart) chart.destroy();
        const last = priceHistory[priceHistory.length-1];
        const prev = priceHistory[priceHistory.length-2] ?? last;
        const rising = last >= prev;
        chart = new Chart(ctx, {
            type: 'line', data: { labels: priceHistory.map((_, i) => i+1), datasets: [{ data: priceHistory, borderColor: rising ? '#34d399' : '#f87171', backgroundColor: rising ? 'rgba(52,211,153,0.05)' : 'rgba(248,113,113,0.05)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5a6377', callback: v => v + ' R' } } }, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `  ${ctx.raw} R币` } } } }
        });
        document.getElementById('currentPrice').innerText = last;
    }
    async function loadLatestPrice() { try { const { data, error } = await supabaseClient.from('stock_prices').select('price').order('id', { ascending: false }).limit(1); if (!error && data?.length && priceHistory[priceHistory.length-1] !== data[0].price) { priceHistory.push(data[0].price); renderStockChart(); } } catch(e) {} }
    function subscribeStockPrice() { supabaseClient.channel('stock-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'stock_prices' }, (payload) => { if (payload.new.price && priceHistory[priceHistory.length-1] !== payload.new.price) { priceHistory.push(payload.new.price); renderStockChart(); } }).subscribe(); }

    // 触发脉冲动画
    let newsTimeout, economyTimeout;
    function animateDot(dotElement, isGold = false) {
        if (!dotElement) return;
        dotElement.classList.remove('pulse-urgent', 'pulse-urgent-gold');
        void dotElement.offsetWidth;
        dotElement.classList.add(isGold ? 'pulse-urgent-gold' : 'pulse-urgent');
        if (isGold) { if (economyTimeout) clearTimeout(economyTimeout); economyTimeout = setTimeout(() => dotElement.classList.remove('pulse-urgent-gold'), 800); }
        else { if (newsTimeout) clearTimeout(newsTimeout); newsTimeout = setTimeout(() => dotElement.classList.remove('pulse-urgent'), 800); }
    }

    let lastNews = '', lastEconomy = '';
    async function loadLatestNews() {
        try {
            const { data, error } = await supabaseClient.from('news').select('*').order('id', { ascending: false }).limit(1);
            const newText = (!error && data?.length) ? data[0].content : '暂无快报';
            const newTime = (!error && data?.length) ? data[0].time : '';
            if (lastNews !== newText) { animateDot(document.getElementById('newsDot'), false); lastNews = newText; }
            document.getElementById('newsContent').innerHTML = newText; document.getElementById('newsTime').innerHTML = newTime;
            setConnectionState('connected');
        } catch(e) { setConnectionState('disconnected'); }
    }
    async function loadLatestEconomy() {
        try {
            const { data, error } = await supabaseClient.from('economy_status').select('*').order('id', { ascending: false }).limit(1);
            const newText = (!error && data?.length) ? data[0].content : '暂无经济动态';
            const newTime = (!error && data?.length) ? data[0].time : '';
            if (lastEconomy !== newText) { animateDot(document.getElementById('economyDot'), true); lastEconomy = newText; }
            document.getElementById('economyContent').innerHTML = newText; document.getElementById('economyTime').innerHTML = newTime;
        } catch(e) {}
    }

    function getProgress(p) { return Math.round(((p.s1?1:0)+(p.s2?1:0)+(p.s3?1:0)+(p.s4?1:0))/4*100); }
    const colorName = { green:'绿', yellow:'黄', orange:'橙', red:'红', black:'黑' };
    
    function getHealthEffectClass(color) {
        if (color === 'yellow') return 'name-effect-yellow';
        if (color === 'orange') return 'name-effect-orange';
        if (color === 'red') return 'name-effect-red';
        if (color === 'black') return 'name-effect-black';
        return '';
    }

    async function loadPlayers() {
        try {
            const { data, error } = await supabaseClient.from('players').select('*').order('group_name');
            if (error) throw error;
            allPlayers = data;
            setConnectionState('connected');
            if (currentPlayer) renderPlayerView();
        } catch(e) { setConnectionState('disconnected'); }
    }

    function renderPlayerView() {
        if (!currentPlayer) return;
        const p = allPlayers.find(x => x.name === currentPlayer.name && x.group_name === currentPlayer.group_name);
        if (!p) { showSelector(); return; }
        const prog = getProgress(p); const isWarning = p.rbc < 5; const col = p.color;
        const healthClass = getHealthEffectClass(col);
        document.getElementById('mainContent').innerHTML = `
            <div class="player-card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:8px;">
                    <div><div class="player-name ${healthClass}">${p.name}</div><div style="font-size:0.7rem; color:var(--text-3); margin-top:4px;">组别 · ${p.group_name}</div></div>
                    <div style="background:var(--surface-3); padding:4px 12px; border-radius:20px; font-size:0.7rem; font-weight:600;">${p.group_name}</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-label">生命颜色</div><div class="color-orb orb-${col}"></div><div style="font-size:0.75rem;">${colorName[col]}</div></div>
                    <div class="stat-box"><div class="stat-label">R 币</div><div class="stat-value rbc-value">${p.rbc}</div></div>
                    <div class="stat-box"><div class="stat-label">章节进度</div><div class="stat-value">${prog}<span style="font-size:1rem;">%</span></div><div style="height:4px; background:var(--surface-4); border-radius:2px; margin-top:6px;"><div style="width:${prog}%; height:4px; background:var(--brand); border-radius:2px;"></div></div></div>
                </div>
                ${isWarning ? `<div class="warning-banner">⚠️ 生存警告！R币不足 5，请尽快补充资源！</div>` : ''}
            </div>
            <div style="text-align:right; margin-top:8px;"><button onclick="window.__resetPlayer()" style="background:var(--surface-3); border:1px solid var(--border); color:var(--text-2); border-radius:20px; padding:4px 12px; font-size:0.7rem; cursor:pointer;">切换角色</button></div>
        `;
    }

    window.__resetPlayer = function() { currentPlayer = null; localStorage.removeItem('current_player'); showSelector(); };
    function showSelector() {
        if (!allPlayers.length) { document.getElementById('mainContent').innerHTML = `<div class="selector-card"><div class="selector-sub">加载玩家名单中…</div></div>`; return; }
        const sorted = [...allPlayers].sort((a,b) => a.group_name.localeCompare(b.group_name));
        let opts = '<option value="">—— 请选择你的角色 ——</option>';
        sorted.forEach(p => opts += `<option value="${p.name}|${p.group_name}">${p.group_name} · ${p.name}</option>`);
        document.getElementById('mainContent').innerHTML = `
            <div class="selector-card"><div class="selector-title" style="font-size:1.4rem;">欢迎来到R城</div><div class="selector-sub">请选择你的角色，即可查看实时游戏状态与数据</div><select id="playerSelect">${opts}</select><button id="confirmBtn" class="btn-primary">确认身份 →</button></div>
        `;
        document.getElementById('confirmBtn').onclick = () => {
            const val = document.getElementById('playerSelect').value;
            if (!val) return;
            const [name, group_name] = val.split('|');
            currentPlayer = { name, group_name };
            localStorage.setItem('current_player', JSON.stringify(currentPlayer));
            renderPlayerView();
        };
    }

    function setupRealtime() {
        supabaseClient.channel('players-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadPlayers()).subscribe();
        supabaseClient.channel('news-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'news' }, () => loadLatestNews()).on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'news' }, () => loadLatestNews()).subscribe();
        supabaseClient.channel('economy-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'economy_status' }, () => loadLatestEconomy()).on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'economy_status' }, () => loadLatestEconomy()).subscribe();
        subscribeStockPrice();
    }

    const urlParams = new URLSearchParams(window.location.search);
    const urlName = urlParams.get('name'), urlGroup = urlParams.get('group');
    if (urlName && urlGroup) { currentPlayer = { name: urlName, group_name: urlGroup }; localStorage.setItem('current_player', JSON.stringify(currentPlayer)); }
    else { try { const s = localStorage.getItem('current_player'); if (s) currentPlayer = JSON.parse(s); } catch(e){} }

    loadPlayers(); loadLatestNews(); loadLatestEconomy(); setupRealtime(); renderStockChart(); loadLatestPrice();
    if (currentPlayer) { let iv = setInterval(() => { if (allPlayers.length) { clearInterval(iv); renderPlayerView(); } }, 200); }
    else { setTimeout(showSelector, 500); }
})();
</script>
</body>
</html>
