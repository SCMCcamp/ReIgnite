<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE:Ignite · 中控端</title>
    <style>
        /* 样式保持不变（略长，已保留原有样式） */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 16px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        h1 { font-size: 1.6rem; }
        .btn { background: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #1a73e8; color: white; }
        
        .control-panels { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .panel { flex: 1; background: white; border-radius: 28px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .panel-title { font-weight: 600; font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; border-left: 4px solid #1a73e8; padding-left: 12px; }
        .panel input, .panel textarea { width: 100%; padding: 10px 14px; border-radius: 60px; border: 1px solid #ddd; margin-bottom: 12px; font-size: 0.9rem; }
        .button-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .quick-btn { background: #eef2f6; border: none; padding: 6px 14px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
        .quick-btn:hover { background: #d0d7de; }
        .latest-item { background: #f8f9fa; border-radius: 20px; padding: 10px 14px; margin-top: 12px; font-size: 0.85rem; border-left: 3px solid #1a73e8; }
        .latest-label { font-weight: 600; color: #1e2a3e; margin-bottom: 4px; font-size: 0.7rem; text-transform: uppercase; }
        .latest-content { word-break: break-word; }
        .latest-time { font-size: 0.65rem; color: #6c757d; text-align: right; margin-top: 4px; }
        
        .collapsible-section { background: white; border-radius: 28px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .collapsible-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; cursor: pointer; font-weight: 600; background: white; }
        .collapsible-header:hover { background: #f8f9fa; }
        .collapsible-content { padding: 0 20px 20px 20px; display: none; border-top: 1px solid #edf2f7; }
        .collapsible-content.expanded { display: block; }
        .chart-controls button, .manual-controls button { background: #eef2f6; border: none; padding: 6px 14px; border-radius: 40px; cursor: pointer; margin-right: 8px; }
        .manual-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .manual-controls input { width: 100px; padding: 6px 12px; border-radius: 40px; border: 1px solid #ccc; }
        canvas { max-height: 280px; width: 100%; margin-top: 16px; }
        
        .filter-bar { background: white; padding: 12px 20px; border-radius: 60px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .group-chip { padding: 6px 16px; border-radius: 40px; background: #eef2f6; cursor: pointer; }
        .group-chip.active { background: #1a73e8; color: white; }
        .clear-filter { margin-left: auto; font-size: 0.8rem; background: #e9ecef; padding: 4px 12px; border-radius: 40px; cursor: pointer; }
        
        .stats-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 20px; padding: 12px 20px; text-align: center; flex: 1; min-width: 80px; cursor: pointer; transition: 0.1s; }
        .stat-card.active-filter { background: #e3f2fd; box-shadow: 0 0 0 2px #1a73e8; }
        .stat-card:hover { background: #e9ecef; }
        
        .table-wrapper { background: white; border-radius: 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { text-align: center; vertical-align: middle; padding: 12px 8px; }
        th { background: #1e2a3e; color: white; }
        td { border-bottom: 1px solid #edf2f7; }
        .warning-row { background-color: #ffebee; }
        
        .color-selector { display: flex; gap: 6px; justify-content: center; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
        .dot-green { background: #4caf50; }
        .dot-yellow { background: #ffc107; }
        .dot-orange { background: #ff9800; }
        .dot-red { background: #f44336; }
        .dot-black { background: #2c3e2f; }
        
        .rbc-control { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
        .rbc-btn { width: 36px; height: 32px; border-radius: 20px; border: none; cursor: pointer; background: #eef2f6; font-weight: bold; }
        .checkbox { width: 20px; height: 20px; cursor: pointer; }
        .save-hint { position: fixed; bottom: 20px; right: 20px; background: #1e2a3e; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; pointer-events: none; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-left: 12px; }
        .connected { background: #e8f5e9; color: #2e7d32; }
        .disconnected { background: #ffebee; color: #d32f2f; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔥 RE:Ignite · 中控端 <span id="statusBadge" class="status disconnected">连接中...</span></h1>
        <div><button class="btn" id="resetAllBtn">🔄 重置所有</button></div>
    </div>

    <div class="control-panels">
        <div class="panel">
            <div class="panel-title">📢 快报广播</div>
            <input type="text" id="newsInput" placeholder="输入快报内容">
            <button class="btn btn-primary" id="sendNewsBtn" style="width:100%;">发送快报</button>
            <div class="latest-item">
                <div class="latest-label">📌 最新快报</div>
                <div class="latest-content" id="latestNewsContent">暂无</div>
                <div class="latest-time" id="latestNewsTime"></div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title">💰 经济状况</div>
            <div class="button-group">
                <button class="quick-btn" data-preset="normal">📊 正常</button>
                <button class="quick-btn" data-preset="inflation">📈 通胀</button>
                <button class="quick-btn" data-preset="deflation">📉 通缩</button>
            </div>
            <input type="text" id="economyInput" placeholder="或自定义经济动态">
            <button class="btn btn-primary" id="setEconomyBtn" style="width:100%;">发布经济动态</button>
            <div class="latest-item">
                <div class="latest-label">📌 最新经济动态</div>
                <div class="latest-content" id="latestEconomyContent">暂无</div>
                <div class="latest-time" id="latestEconomyTime"></div>
            </div>
        </div>
    </div>

    <div class="collapsible-section">
        <div class="collapsible-header" id="stockHeader">
            <span>📈 RE:Set股 · 实时价格走势 (点击展开/收起)</span>
            <span>▼</span>
        </div>
        <div class="collapsible-content" id="stockContent">
            <div class="chart-controls">
                <button id="addRandomPriceBtn">🎲 随机波动 + 记录</button>
                <button id="syncEconomyBtn">📉 根据当前经济动态调整</button>
            </div>
            <canvas id="priceChart" width="800" height="230"></canvas>
            <div class="manual-controls">
                <span>手动设置股价：</span>
                <input type="number" id="manualPriceInput" step="1" placeholder="输入数字">
                <button id="manualSetPriceBtn">✏️ 设置股价</button>
                <span style="margin-left: auto;">当前价格: <strong id="currentPrice">--</strong> R币</span>
            </div>
            <div style="font-size:0.7rem; margin-top:12px; text-align:center; color:#6c757d;">
                每30分钟自动随机波动一次 | 价格变动自动保存到数据库，玩家端实时同步
            </div>
        </div>
    </div>

    <div class="filter-bar">
        <div style="display: flex; gap: 8px;">
            <span class="group-chip active" data-group="all">全部</span>
            <span class="group-chip" data-group="A组">A组</span>
            <span class="group-chip" data-group="B组">B组</span>
            <span class="group-chip" data-group="C组">C组</span>
            <span class="group-chip" data-group="D组">D组</span>
        </div>
        <span id="clearFilterBtn" class="clear-filter">✖ 清除颜色筛选</span>
    </div>

    <div class="stats-grid" id="statsPanel"></div>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>玩家</th><th>组</th><th>颜色</th><th>R币</th><th>站1</th><th>站2</th><th>站3</th><th>站4</th><th>进度</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
<div class="save-hint" id="saveHint">✓ 已同步云端</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function(){
        const SUPABASE_URL = "https://vycanjsrmxdlnxauqvtc.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Y2FuanNybXhkbG54YXVxdnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mjk2ODcsImV4cCI6MjA5MzIwNTY4N30.NAGbSNYe_7-mcvvpFeBODeHEM59IHqoWKY-RaX5jU6c";

        let supabaseClient;
        if (window.__supabaseAdminClient) {
            supabaseClient = window.__supabaseAdminClient;
        } else {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            window.__supabaseAdminClient = supabaseClient;
        }

        let uniquePlayers = [];
        let currentGroup = "all";
        let currentColorFilter = null;
        let priceHistory = [5];
        let chart = null;
        let autoTimer = null;

        // ---------- 股票数据库操作 ----------
        async function savePriceToDB(price) {
            const { error } = await supabaseClient.from('stock_prices').insert([{ price }]);
            if (error) console.error('保存股价失败:', error);
        }

        async function initPriceHistoryFromDB() {
            const { data, error } = await supabaseClient.from('stock_prices').select('price').order('id', { ascending: true });
            if (!error && data && data.length) {
                priceHistory = data.map(row => row.price);
            } else {
                // 如果没有数据，插入初始值5
                await savePriceToDB(5);
                priceHistory = [5];
            }
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: priceHistory.map((_, i) => `点${i+1}`),
                    datasets: [{ label: 'RE:Set股 价格 (R币)', data: priceHistory, borderColor: '#ff9800', backgroundColor: 'rgba(255,152,0,0.1)', tension: 0.2, fill: true, pointBackgroundColor: '#ff9800', pointRadius: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.raw} R币` } } } }
            });
            document.getElementById('currentPrice').innerText = priceHistory[priceHistory.length-1];
        }

        async function addPricePoint(newPrice) {
            newPrice = Math.max(1, Math.round(newPrice));
            priceHistory.push(newPrice);
            await savePriceToDB(newPrice);
            renderChart();
        }

        async function randomFluctuation() {
            let last = priceHistory[priceHistory.length-1];
            let change = (Math.random() - 0.5) * 0.2;
            let newPrice = last * (1 + change);
            await addPricePoint(newPrice);
        }

        async function adjustPriceByEconomy(content) {
            let last = priceHistory[priceHistory.length-1];
            let percent = 0;
            if (content.includes('通胀') || content.includes('涨价')) percent = (Math.random() * 10 + 5) / 100;
            else if (content.includes('通缩') || content.includes('降价')) percent = -(Math.random() * 10 + 5) / 100;
            else percent = (Math.random() * 4 - 2) / 100;
            let newPrice = last * (1 + percent);
            await addPricePoint(newPrice);
        }

        function startAutoAdjust() {
            if (autoTimer) clearInterval(autoTimer);
            autoTimer = setInterval(() => { randomFluctuation(); }, 30 * 60 * 1000);
        }

        // ---------- 玩家数据操作 ----------
        async function loadPlayers() {
            const { data, error } = await supabaseClient.from('players').select('*').order('group_name').order('hand_code');
            if (error) { console.error(error); updateStatus(false); return; }
            const map = new Map();
            for (const p of data) { const key = `${p.name}|${p.group_name}`; if (!map.has(key)) map.set(key, p); }
            uniquePlayers = Array.from(map.values());
            updateStatus(true);
            renderUI();
        }

        async function updatePlayer(id, updates) {
            const { error } = await supabaseClient.from('players').update(updates).eq('id', id);
            if (!error) {
                document.getElementById('saveHint').classList.add('show');
                setTimeout(() => document.getElementById('saveHint').classList.remove('show'), 1000);
                await loadPlayers();
            } else alert('更新失败: ' + error.message);
        }

        window.changeRbc = (player, delta) => updatePlayer(player.id, { rbc: Math.max(0, player.rbc + delta) });
        window.setColor = (player, color) => { if (['green','yellow','orange','red','black'].includes(color)) updatePlayer(player.id, { color }); };
        window.toggleStation = (player, station) => updatePlayer(player.id, { [station]: !player[station] });

        function getProgress(p) { const done = (p.s1?1:0)+(p.s2?1:0)+(p.s3?1:0)+(p.s4?1:0); return Math.round(done/4*100); }

        // ---------- 快报和经济 ----------
        async function loadLatestNews() {
            const { data, error } = await supabaseClient.from('news').select('*').order('id', { ascending: false }).limit(1);
            if (!error && data && data.length) {
                document.getElementById('latestNewsContent').innerText = data[0].content;
                document.getElementById('latestNewsTime').innerText = data[0].time;
            }
        }

        async function loadLatestEconomy() {
            const { data, error } = await supabaseClient.from('economy_status').select('*').order('id', { ascending: false }).limit(1);
            if (!error && data && data.length) {
                document.getElementById('latestEconomyContent').innerText = data[0].content;
                document.getElementById('latestEconomyTime').innerText = data[0].time;
            }
        }

        async function sendNews() {
            const content = document.getElementById('newsInput').value.trim();
            if (!content) return;
            const timeStr = new Date().toLocaleTimeString();
            const { error } = await supabaseClient.from('news').insert([{ content, time: timeStr }]);
            if (error) alert('发送失败: ' + error.message);
            else { alert('快报已发送'); document.getElementById('newsInput').value = ''; loadLatestNews(); }
        }

        async function publishEconomy(content) {
            if (!content) return;
            const timeStr = new Date().toLocaleTimeString();
            const { error } = await supabaseClient.from('economy_status').insert([{ content, time: timeStr }]);
            if (error) alert('发布失败: ' + error.message);
            else {
                alert('经济动态已发布');
                loadLatestEconomy();
                await adjustPriceByEconomy(content);
                document.getElementById('economyInput').value = '';
            }
        }

        const presetMap = {
            normal: "正常经济 · 甜品原价 · R币获取正常",
            inflation: "📈 通胀来袭！超市甜品价格上涨2R币，R币获取减半",
            deflation: "📉 通缩来临！超市甜品降价2R币，R币获取翻倍"
        };

        async function resetAll() {
            if(confirm('重置所有玩家？')) {
                for (let p of uniquePlayers) await updatePlayer(p.id, { color: 'green', rbc: 10, s1: false, s2: false, s3: false, s4: false });
                await loadPlayers();
            }
        }

        // ---------- UI 渲染 ----------
        function renderStatsAndFilters() {
            const stats = { total: uniquePlayers.length, green:0, yellow:0, orange:0, red:0, black:0, warn:0 };
            for (let p of uniquePlayers) {
                if(p.color === 'green') stats.green++;
                else if(p.color === 'yellow') stats.yellow++;
                else if(p.color === 'orange') stats.orange++;
                else if(p.color === 'red') stats.red++;
                else if(p.color === 'black') stats.black++;
                if(p.rbc < 5) stats.warn++;
            }
            const panel = document.getElementById('statsPanel');
            panel.innerHTML = `
                <div class="stat-card ${currentColorFilter === null ? 'active-filter' : ''}" data-filter="all">👥 ${stats.total}</div>
                <div class="stat-card" data-filter="green">🟢 ${stats.green}</div>
                <div class="stat-card" data-filter="yellow">🟡 ${stats.yellow}</div>
                <div class="stat-card" data-filter="orange">🟠 ${stats.orange}</div>
                <div class="stat-card" data-filter="red">🔴 ${stats.red}</div>
                <div class="stat-card" data-filter="black">⚫ ${stats.black}</div>
                <div class="stat-card" data-filter="warn">⚠️ ${stats.warn}</div>
            `;
            document.querySelectorAll('.stat-card').forEach(card => {
                card.addEventListener('click', () => {
                    const filter = card.getAttribute('data-filter');
                    currentColorFilter = (filter === 'all') ? null : filter;
                    renderUI();
                });
            });
        }

        function getFilteredPlayers() {
            let filtered = [...uniquePlayers];
            if (currentGroup !== "all") filtered = filtered.filter(p => p.group_name === currentGroup);
            if (currentColorFilter) {
                if (currentColorFilter === 'warn') filtered = filtered.filter(p => p.rbc < 5);
                else filtered = filtered.filter(p => p.color === currentColorFilter);
            }
            return filtered;
        }

        function renderUI() {
            renderStatsAndFilters();
            document.querySelectorAll('.group-chip').forEach(chip => {
                if (chip.getAttribute('data-group') === currentGroup) chip.classList.add('active');
                else chip.classList.remove('active');
            });
            const filtered = getFilteredPlayers();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            filtered.forEach(p => {
                const row = tbody.insertRow();
                if(p.rbc < 5) row.classList.add('warning-row');
                row.insertCell(0).innerText = p.name;
                row.insertCell(1).innerText = p.group_name;
                const colorCell = row.insertCell(2);
                const colors = ['green','yellow','orange','red','black'];
                const cDiv = document.createElement('div'); cDiv.className = 'color-selector';
                colors.forEach(c => {
                    const dot = document.createElement('div');
                    dot.className = `color-dot dot-${c}`;
                    if(p.color === c) dot.style.border = '2px solid #333';
                    dot.addEventListener('click', () => window.setColor(p, c));
                    cDiv.appendChild(dot);
                });
                colorCell.appendChild(cDiv);
                const rbcCell = row.insertCell(3);
                const rbDiv = document.createElement('div'); rbDiv.className = 'rbc-control';
                rbDiv.innerHTML = `<button class="rbc-btn">-5</button><button class="rbc-btn">-2</button><button class="rbc-btn">-1</button><span>${p.rbc}</span><button class="rbc-btn">+1</button><button class="rbc-btn">+2</button><button class="rbc-btn">+5</button>`;
                const btns = rbDiv.children;
                btns[0].onclick = () => window.changeRbc(p, -5);
                btns[1].onclick = () => window.changeRbc(p, -2);
                btns[2].onclick = () => window.changeRbc(p, -1);
                btns[4].onclick = () => window.changeRbc(p, 1);
                btns[5].onclick = () => window.changeRbc(p, 2);
                btns[6].onclick = () => window.changeRbc(p, 5);
                rbcCell.appendChild(rbDiv);
                const createCheck = (s, chk) => { const cb = document.createElement('input'); cb.type='checkbox'; cb.checked=chk; cb.onchange = () => window.toggleStation(p, s); return cb; };
                row.insertCell(4).appendChild(createCheck('s1', p.s1));
                row.insertCell(5).appendChild(createCheck('s2', p.s2));
                row.insertCell(6).appendChild(createCheck('s3', p.s3));
                row.insertCell(7).appendChild(createCheck('s4', p.s4));
                row.insertCell(8).innerHTML = `<span style="background:#e9ecef;padding:4px 8px;border-radius:40px;">${getProgress(p)}%</span>`;
            });
        }

        function setupRealtime() {
            supabaseClient.channel('players-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadPlayers()).subscribe();
            supabaseClient.channel('news-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'news' }, () => loadLatestNews()).subscribe();
            supabaseClient.channel('economy-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'economy_status' }, () => loadLatestEconomy()).subscribe();
        }

        function updateStatus(connected) {
            const badge = document.getElementById('statusBadge');
            if (badge) {
                badge.className = `status ${connected ? 'connected' : 'disconnected'}`;
                badge.innerText = connected ? '● 已连接云端' : '● 离线';
            }
        }

        // 事件绑定
        function initCollapsible() {
            const header = document.getElementById('stockHeader');
            const content = document.getElementById('stockContent');
            let expanded = false;
            header.addEventListener('click', () => {
                expanded = !expanded;
                content.classList.toggle('expanded', expanded);
                header.querySelector('span:last-child').innerHTML = expanded ? '▲' : '▼';
            });
        }

        document.getElementById('sendNewsBtn')?.addEventListener('click', sendNews);
        document.getElementById('setEconomyBtn')?.addEventListener('click', () => {
            const custom = document.getElementById('economyInput').value.trim();
            if (custom) publishEconomy(custom);
            else alert('请输入经济动态内容');
        });
        document.getElementById('clearFilterBtn')?.addEventListener('click', () => { currentColorFilter = null; renderUI(); });
        document.getElementById('resetAllBtn')?.addEventListener('click', resetAll);
        document.getElementById('addRandomPriceBtn')?.addEventListener('click', randomFluctuation);
        document.getElementById('syncEconomyBtn')?.addEventListener('click', async () => {
            const econ = document.getElementById('latestEconomyContent').innerText;
            if (econ && econ !== '暂无') await adjustPriceByEconomy(econ);
            else alert('暂无经济动态，请先发布一条经济状况');
        });
        document.getElementById('manualSetPriceBtn')?.addEventListener('click', async () => {
            const val = parseFloat(document.getElementById('manualPriceInput').value);
            if (isNaN(val)) alert('请输入有效数字');
            else await addPricePoint(val);
            document.getElementById('manualPriceInput').value = '';
        });
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const preset = btn.getAttribute('data-preset');
                if (preset && presetMap[preset]) document.getElementById('economyInput').value = presetMap[preset];
            });
        });
        document.querySelectorAll('.group-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                currentGroup = chip.getAttribute('data-group');
                renderUI();
            });
        });

        // 启动
        loadPlayers();
        loadLatestNews();
        loadLatestEconomy();
        setupRealtime();
        initPriceHistoryFromDB();
        startAutoAdjust();
        initCollapsible();
    })();
</script>
</body>
</html>
