<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燃·命 | 中控端（Supabase）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 16px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        h1 { font-size: 1.6rem; }
        .btn { border: none; background: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        .btn-primary { background: #1a73e8; color: white; }
        .filter-bar { background: white; padding: 12px 20px; border-radius: 60px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .group-chip { padding: 6px 16px; border-radius: 40px; background: #eef2f6; cursor: pointer; }
        .group-chip.active { background: #1a73e8; color: white; }
        .stats-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 20px; padding: 12px 20px; text-align: center; flex: 1; }
        .table-wrapper { background: white; border-radius: 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #1e2a3e; color: white; padding: 12px 8px; }
        td { padding: 10px 8px; border-bottom: 1px solid #edf2f7; }
        .color-selector { display: flex; gap: 6px; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
        .dot-green { background: #4caf50; }
        .dot-yellow { background: #ffc107; }
        .dot-red { background: #f44336; }
        .dot-black { background: #2c3e2f; }
        .rbc-control { display: flex; gap: 8px; align-items: center; }
        .rbc-btn { width: 28px; height: 28px; border-radius: 20px; border: none; cursor: pointer; background: #eef2f6; }
        .checkbox { width: 20px; height: 20px; cursor: pointer; }
        .warning-row { background-color: #ffebee; }
        .news-input { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: white; padding: 12px 20px; border-radius: 60px; }
        .news-input input { flex: 1; padding: 10px 16px; border-radius: 40px; border: 1px solid #ddd; }
        .save-hint { position: fixed; bottom: 20px; right: 20px; background: #1e2a3e; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; }
        .connected { background: #e8f5e9; color: #2e7d32; }
        .disconnected { background: #ffebee; color: #d32f2f; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔥 中控端 · Supabase云端版 <span id="statusBadge" class="status disconnected">连接中...</span></h1>
        <div><button class="btn" id="resetAllBtn">🔄 重置所有</button></div>
    </div>
    <div class="news-input">
        <span>📢 快报广播：</span>
        <input type="text" id="newsInput" placeholder="例如：霍尔木兹风暴！超市涨价！">
        <button class="btn btn-primary" id="sendNewsBtn">发送给所有玩家</button>
    </div>
    <div class="filter-bar">
        <div id="groupFilter" style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div class="group-chip active" data-group="all">全部</div>
            <div class="group-chip" data-group="A组">A组</div>
            <div class="group-chip" data-group="B组">B组</div>
            <div class="group-chip" data-group="C组">C组</div>
            <div class="group-chip" data-group="D组">D组</div>
        </div>
    </div>
    <div class="stats-grid" id="statsPanel"></div>
    <div class="table-wrapper">
        <table id="playerTable"><thead><tr><th>玩家</th><th>组</th><th>手环</th><th>颜色</th><th>R币</th><th>站1</th><th>站2</th><th>站3</th><th>站4</th><th>进度</th></tr></thead><tbody id="tableBody"></tbody></table>
    </div>
</div>
<div class="save-hint" id="saveHint">✓ 已同步到云端</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ========== 请在这里填写你的 Supabase 配置 ==========
    const SUPABASE_URL = "https://vycanjsrmxdlnxauqvtc.supabase.co";  // 替换成你的 URL
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Y2FuanNybXhkbG54YXVxdnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mjk2ODcsImV4cCI6MjA5MzIwNTY4N30.NAGbSNYe_7-mcvvpFeBODeHEM59IHqoWKY-RaX5jU6c";        // 替换成你的密钥
    // ===================================================
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allPlayers = [];
    let currentGroup = "all";
    
    // 更新连接状态
    function updateStatus(connected) {
        const badge = document.getElementById('statusBadge');
        if (connected) {
            badge.className = 'status connected';
            badge.innerText = '● 已连接云端';
        } else {
            badge.className = 'status disconnected';
            badge.innerText = '● 离线';
        }
    }
    
    // 加载玩家数据
    async function loadPlayers() {
        const { data, error } = await supabase.from('players').select('*');
        if (error) {
            console.error('加载失败:', error);
            updateStatus(false);
            return;
        }
        allPlayers = data;
        updateStatus(true);
        renderUI();
    }
    
    // 更新玩家数据
    async function updatePlayer(playerId, updates) {
        const { error } = await supabase.from('players').update(updates).eq('id', playerId);
        if (error) console.error('更新失败:', error);
        else document.getElementById('saveHint').classList.add('show');
        setTimeout(() => document.getElementById('saveHint').classList.remove('show'), 1000);
    }
    
    function changeRbc(player, delta) {
        const newRbc = Math.max(0, player.rbc + delta);
        updatePlayer(player.id, { rbc: newRbc });
    }
    
    function setColor(player, color) {
        updatePlayer(player.id, { color: color });
    }
    
    function toggleStation(player, station) {
        const newValue = !player[station];
        updatePlayer(player.id, { [station]: newValue });
    }
    
    function getProgress(p) {
        let done = (p.s1?1:0)+(p.s2?1:0)+(p.s3?1:0)+(p.s4?1:0);
        return Math.round(done/4*100);
    }
    
    // 发送快报
    async function sendNews() {
        const input = document.getElementById('newsInput');
        const content = input.value.trim();
        if(content) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            await supabase.from('news').insert([{ content: content, time: timeStr }]);
            alert('快报已发送！所有玩家将收到通知');
            input.value = '';
        }
    }
    
    // 重置所有
    async function resetAll() {
        if(confirm('⚠️ 重置所有玩家：颜色变绿、R币变10、清空所有站进度？')) {
            for (let p of allPlayers) {
                await updatePlayer(p.id, { color: 'green', rbc: 10, s1: false, s2: false, s3: false, s4: false });
            }
        }
    }
    
    function renderUI() {
        let filtered = currentGroup === "all" ? allPlayers : allPlayers.filter(p => p.group_name === currentGroup);
        let green=0,yellow=0,red=0,black=0,totalRbc=0,warn=0;
        filtered.forEach(p => { 
            if(p.color==='green') green++; 
            else if(p.color==='yellow') yellow++; 
            else if(p.color==='red') red++; 
            else if(p.color==='black') black++; 
            totalRbc+=p.rbc; 
            if(p.rbc<5) warn++; 
        });
        document.getElementById('statsPanel').innerHTML = `
            <div class="stat-card">👥 ${filtered.length}</div>
            <div class="stat-card">💰 ${totalRbc}</div>
            <div class="stat-card">🟢 ${green}</div>
            <div class="stat-card">🟡 ${yellow}</div>
            <div class="stat-card">🔴 ${red}</div>
            <div class="stat-card">⚫ ${black}</div>
            <div class="stat-card">⚠️ ${warn}</div>
        `;
        const tbody = document.getElementById('tableBody'); 
        tbody.innerHTML = '';
        filtered.forEach(p => {
            const row = tbody.insertRow(); 
            if(p.rbc<5) row.classList.add('warning-row');
            row.insertCell(0).innerText = p.name; 
            row.insertCell(1).innerText = p.group_name; 
            row.insertCell(2).innerText = p.hand_code;
            
            const colorCell = row.insertCell(3); 
            const cDiv = document.createElement('div'); 
            cDiv.className = "color-selector";
            [{v:"green",c:"dot-green"},{v:"yellow",c:"dot-yellow"},{v:"red",c:"dot-red"},{v:"black",c:"dot-black"}].forEach(c => { 
                const dot = document.createElement('div'); 
                dot.className = `color-dot ${c.c}`; 
                if(p.color === c.v) dot.style.border = "2px solid #333"; 
                dot.addEventListener('click', () => setColor(p, c.v)); 
                cDiv.appendChild(dot); 
            });
            colorCell.appendChild(cDiv);
            
            const rbcCell = row.insertCell(4); 
            const rbDiv = document.createElement('div'); 
            rbDiv.className = "rbc-control"; 
            rbDiv.innerHTML = `<button class="rbc-btn">-1</button><span style="min-width:40px;text-align:center;">${p.rbc}</span><button class="rbc-btn">+1</button>`;
            rbDiv.children[0].addEventListener('click', () => changeRbc(p, -1)); 
            rbDiv.children[2].addEventListener('click', () => changeRbc(p, 1)); 
            rbcCell.appendChild(rbDiv);
            
            const createChk = (checked, station) => { 
                const cb = document.createElement('input'); 
                cb.type='checkbox'; 
                cb.checked=checked; 
                cb.addEventListener('change', () => toggleStation(p, station)); 
                return cb; 
            };
            row.insertCell(5).appendChild(createChk(p.s1,'s1')); 
            row.insertCell(6).appendChild(createChk(p.s2,'s2')); 
            row.insertCell(7).appendChild(createChk(p.s3,'s3')); 
            row.insertCell(8).appendChild(createChk(p.s4,'s4'));
            row.insertCell(9).innerHTML = `<span style="background:#e9ecef;padding:4px 8px;border-radius:40px;">${getProgress(p)}%</span>`;
        });
    }
    
    // 设置实时订阅
    function setupRealtime() {
        supabase.channel('players-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, 
                (payload) => { loadPlayers(); })
            .subscribe();
    }
    
    // 初始化
    loadPlayers();
    setupRealtime();
    
    document.getElementById('sendNewsBtn')?.addEventListener('click', sendNews);
    document.getElementById('resetAllBtn')?.addEventListener('click', resetAll);
    document.querySelectorAll('.group-chip').forEach(chip => { 
        chip.addEventListener('click', () => { 
            currentGroup = chip.getAttribute('data-group'); 
            document.querySelectorAll('.group-chip').forEach(c=>c.classList.remove('active')); 
            chip.classList.add('active'); 
            renderUI(); 
        }); 
    });
</script>
</body>
</html>
