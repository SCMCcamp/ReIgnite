<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE:Ignite · 中控端</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #e8501a;
            --brand-dim: rgba(232,80,26,0.15);
            --brand-glow: rgba(232,80,26,0.3);
            --surface: #0f1117;
            --surface-2: #161b26;
            --surface-3: #1e2435;
            --surface-4: #252d3f;
            --text-1: #f0f2f8;
            --text-2: #8a94a8;
            --text-3: #5a6377;
            --border: rgba(255,255,255,0.07);
            --border-2: rgba(255,255,255,0.12);
            --gold: #f5a623;
            --gold-dim: rgba(245,166,35,0.12);
            --green: #34d399;
            --green-dim: rgba(52,211,153,0.12);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.12);
            --blue: #60a5fa;
            --blue-dim: rgba(96,165,250,0.1);
            --orange: #f97316;
            --orange-dim: rgba(249,115,22,0.15);
        }
        [data-theme="light"] {
            --surface: #f4f5f7;
            --surface-2: #ffffff;
            --surface-3: #f0f1f4;
            --surface-4: #e4e6ec;
            --text-1: #111827;
            --text-2: #4b5563;
            --text-3: #9ca3af;
            --border: rgba(0,0,0,0.08);
            --border-2: rgba(0,0,0,0.14);
            --gold: #d97706;
            --gold-dim: rgba(217,119,6,0.1);
            --green: #059669;
            --green-dim: rgba(5,150,105,0.1);
            --red: #dc2626;
            --red-dim: rgba(220,38,38,0.08);
            --blue: #2563eb;
            --blue-dim: rgba(37,99,235,0.08);
            --orange: #ea580c;
            --orange-dim: rgba(234,88,12,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--surface);
            color: var(--text-1);
            padding: 24px 20px 40px;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(232,80,26,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(96,165,250,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .container { max-width: 1600px; margin: 0 auto; position: relative; z-index: 1; }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 60%, rgba(96,165,250,0.04) 100%);
            backdrop-filter: blur(16px) saturate(1.5);
            -webkit-backdrop-filter: blur(16px) saturate(1.5);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.1), 0 8px 24px rgba(0,0,0,0.2);
            border-radius: 28px;
            transition: all 0.2s ease;
        }
        [data-theme="light"] .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.4) 60%, rgba(96,165,250,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), inset 0 -1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.08);
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; color: var(--text-1); }
        .logo-text span { color: var(--brand); }
        
        .status-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid;
            background: var(--surface-3);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.2s; }
        .status-connecting { border-color: rgba(249,115,22,0.5); color: var(--orange); }
        .status-connecting .status-dot { background: var(--orange); animation: pulseOrange 1.2s infinite; }
        .status-connected { border-color: rgba(52,211,153,0.4); color: var(--green); }
        .status-connected .status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .status-disconnected { border-color: rgba(248,113,113,0.5); color: var(--red); }
        .status-disconnected .status-dot { background: var(--red); animation: blinkRed 0.6s step-start infinite; }
        @keyframes pulseOrange { 0%,100% { opacity: 0.6; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } }
        @keyframes blinkRed { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .btn { background: var(--surface-3); border: 1px solid var(--border-2); padding: 8px 20px; border-radius: 40px; cursor: pointer; color: var(--text-1); font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: var(--brand); border: none; color: white; }
        .btn-primary:hover { background: #d44516; transform: translateY(-1px); }
        
        .panels { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 28px; }
        .panel { flex: 1; padding: 20px 24px; }
        .panel-title { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; border-left: 3px solid var(--brand); padding-left: 14px; }
        .panel input, .panel textarea { width: 100%; padding: 12px 16px; border-radius: 48px; border: 1px solid var(--border-2); background: var(--surface-2); color: var(--text-1); font-size: 0.9rem; margin-bottom: 14px; }
        .quick-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
        .quick-btn { background: var(--surface-4); border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
        .latest-item { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 12px 16px; margin-top: 16px; position: relative; border-left: 3px solid var(--brand); }
        .latest-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-3); margin-bottom: 6px; }
        .latest-content { font-size: 0.85rem; word-break: break-word; padding-right: 30px; }
        .latest-time { font-size: 0.65rem; color: var(--text-3); text-align: right; margin-top: 6px; }
        .delete-btn { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--red); cursor: pointer; font-size: 1rem; opacity: 0.6; }
        .delete-btn:hover { opacity: 1; }
        
        .filter-bar { background: var(--surface-2); border-radius: 60px; padding: 12px 24px; margin-bottom: 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; border: 1px solid var(--border); }
        .group-chip { padding: 6px 18px; border-radius: 40px; background: var(--surface-3); cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .group-chip.active { background: var(--brand); color: white; }
        
        .stats-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
        .stat-card { background: var(--surface-3); border-radius: 20px; padding: 12px 20px; text-align: center; flex: 1; min-width: 80px; cursor: pointer; border: 1px solid var(--border); transition: all 0.1s; }
        .stat-card.active-filter { background: var(--brand-dim); border-color: var(--brand); box-shadow: 0 0 0 1px var(--brand); }
        
        .table-wrapper { overflow-x: auto; border-radius: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 10px; text-align: center; border-bottom: 1px solid var(--border); }
        th { background: var(--surface-3); color: var(--text-2); font-weight: 600; font-size: 0.8rem; }
        .warning-row { background: var(--red-dim); }
        
        /* 颜色圆点增强：外发光 + 轻微缩放动画，更醒目 */
        .color-selector { display: flex; gap: 8px; justify-content: center; }
        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
        }
        .color-dot:hover { transform: scale(1.1); }
        /* 当前选中的颜色增加外发光 */
        .dot-green.active-dot { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #4caf50, 0 0 8px 2px #4caf50; }
        .dot-yellow.active-dot { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #ffc107, 0 0 8px 2px #ffc107; }
        .dot-orange.active-dot { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #ff9800, 0 0 8px 2px #ff9800; }
        .dot-red.active-dot { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #f44336, 0 0 8px 2px #f44336; }
        .dot-black.active-dot { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #546e7a, 0 0 8px 2px #546e7a; }
        
        .dot-green { background: #4caf50; }
        .dot-yellow { background: #ffc107; }
        .dot-orange { background: #ff9800; }
        .dot-red { background: #f44336; }
        .dot-black { background: #2c3e2f; }
        
        .rbc-control, .loan-check { display: flex; gap: 8px; justify-content: center; align-items: center; }
        .rbc-btn { background: var(--surface-4); border: none; width: 32px; height: 32px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .loan-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--brand); transform: scale(1.1); }
        .checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--brand); }
        
        .toast-msg { position: fixed; bottom: 30px; right: 30px; background: var(--surface-2); padding: 10px 20px; border-radius: 40px; color: var(--text-1); border-left: 4px solid var(--brand); opacity: 0; transition: 0.2s; z-index: 200; pointer-events: none; }
        .theme-toggle { background: var(--surface-3); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-text">RE<span>:</span>Ignite</div><div id="statusBadge" class="status-pill status-connecting"><span class="status-dot"></span>连接中…</div></div>
        <div style="display: flex; gap: 12px;"><button class="theme-toggle" id="themeToggle">🌙</button><button class="btn" id="resetAllBtn">🔄 重置所有</button></div>
    </div>

    <div class="panels">
        <div class="panel glass-card">
            <div class="panel-title">📢 快报广播</div>
            <input type="text" id="newsInput" placeholder="输入快报内容...">
            <button class="btn btn-primary" id="sendNewsBtn" style="width:100%;">发送快报</button>
            <div class="latest-item"><div class="latest-label">📌 最新快报</div><div class="latest-content" id="latestNewsContent">暂无</div><div class="latest-time" id="latestNewsTime"></div><button class="delete-btn" id="deleteNewsBtn">🗑️</button></div>
        </div>
        <div class="panel glass-card">
            <div class="panel-title">💰 经济状况</div>
            <div class="quick-group"><button class="quick-btn" data-preset="normal">📊 正常</button><button class="quick-btn" data-preset="inflation">📈 通胀</button><button class="quick-btn" data-preset="deflation">📉 通缩</button></div>
            <input type="text" id="economyInput" placeholder="或自定义经济动态...">
            <button class="btn btn-primary" id="setEconomyBtn" style="width:100%;">发布经济动态</button>
            <div class="latest-item"><div class="latest-label">📌 最新经济动态</div><div class="latest-content" id="latestEconomyContent">暂无</div><div class="latest-time" id="latestEconomyTime"></div><button class="delete-btn" id="deleteEconomyBtn">🗑️</button></div>
        </div>
    </div>

    <div class="glass-card" style="margin-bottom: 24px; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 16px;">
            <div style="font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 600;">📈 RE:Set股 · 实时价格走势</div>
            <div><button id="addRandomPriceBtn" class="btn">🎲 随机波动</button><button id="syncEconomyBtn" class="btn" style="margin-left: 8px;">📉 经济联动调整</button></div>
        </div>
        <canvas id="priceChart" height="200" style="max-height: 200px; width: 100%;"></canvas>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; flex-wrap: wrap; gap: 12px;">
            <div style="display: flex; gap: 8px; align-items: center;"><span>手动设置股价：</span><input type="number" id="manualPriceInput" style="width: 100px; padding: 6px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface-2);"><button id="manualSetPriceBtn" class="btn">✏️ 设置</button></div>
            <div>当前价格: <strong id="currentPrice">--</strong> R币</div>
        </div>
        <div style="font-size:0.7rem; text-align:center; margin-top: 12px; color: var(--text-3);">每30分钟自动随机波动一次 | 价格变动自动保存</div>
    </div>

    <div class="filter-bar">
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <span class="group-chip active" data-group="all">全部</span>
            <span class="group-chip" data-group="尼西米">尼西米</span>
            <span class="group-chip" data-group="以利亚">以利亚</span>
            <span class="group-chip" data-group="约拿">约拿</span>
            <span class="group-chip" data-group="基甸">基甸</span>
            <span class="group-chip" data-group="拿单">拿单</span>
            <span class="group-chip" data-group="撒母耳">撒母耳</span>
        </div>
        <span id="clearFilterBtn" class="btn" style="margin-left: auto;">✖ 清除颜色筛选</span>
    </div>

    <div class="stats-grid" id="statsPanel"></div>
    <div class="table-wrapper glass-card">
        <table>
            <thead>
                <tr><th>玩家</th><th>组</th><th>颜色</th><th>R币</th><th>贷款</th><th>站1</th><th>站2</th><th>站3</th><th>站4</th><th>进度</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
<div class="toast-msg" id="toastMsg"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
    // === 主题切换 ===
    const themeBtn = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('reignite_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    themeBtn.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('reignite_theme', next);
        themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
    });

    const SUPABASE_URL = "https://vycanjsrmxdlnxauqvtc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Y2FuanNybXhkbG54YXVxdnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mjk2ODcsImV4cCI6MjA5MzIwNTY4N30.NAGbSNYe_7-mcvvpFeBODeHEM59IHqoWKY-RaX5jU6c";
    let supabaseClient = window.__supabaseAdminClient || (window.__supabaseAdminClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
    
    let uniquePlayers = [], currentGroup = "all", currentColorFilter = null, priceHistory = [5], chart = null, autoTimer = null;
    let currentNewsId = null, currentEconomyId = null;
    
    // 注意：需要在 Supabase 的 players 表中添加 loan 列 (BOOLEAN DEFAULT FALSE)
    // 执行 SQL: ALTER TABLE players ADD COLUMN loan BOOLEAN DEFAULT FALSE;
    // 如果你还没有添加，前端会临时存储，但刷新后可能丢失。强烈建议执行上述 SQL。
    
    function setConnectionState(state) {
        const badge = document.getElementById('statusBadge');
        badge.classList.remove('status-connecting','status-connected','status-disconnected');
        if(state === 'connected') { badge.classList.add('status-connected'); badge.innerHTML = '<span class="status-dot"></span>已连接'; }
        else if(state === 'disconnected') { badge.classList.add('status-disconnected'); badge.innerHTML = '<span class="status-dot"></span>失联'; }
        else { badge.classList.add('status-connecting'); badge.innerHTML = '<span class="status-dot"></span>连接中…'; }
    }
    function showToast(msg, isError=false) { const t=document.getElementById('toastMsg'); t.innerText=msg; t.style.background=isError?'var(--red-dim)':'var(--brand-dim)'; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2500); }
    
    // 股票
    async function savePriceToDB(price) { const { error } = await supabaseClient.from('stock_prices').insert([{ price }]); if(error) console.error(error); }
    async function initPriceHistory() { const { data } = await supabaseClient.from('stock_prices').select('price').order('id'); if(data?.length) priceHistory = data.map(r=>r.price); else { await savePriceToDB(5); priceHistory=[5]; } renderChart(); }
    function renderChart() {
        const ctx = document.getElementById('priceChart').getContext('2d');
        if(chart) chart.destroy();
        const last = priceHistory[priceHistory.length-1], prev = priceHistory[priceHistory.length-2]??last, rising=last>=prev;
        chart = new Chart(ctx, {
            type: 'line', data: { labels: priceHistory.map((_,i)=>i+1), datasets: [{ data: priceHistory, borderColor: rising?'#34d399':'#f87171', backgroundColor: rising?'rgba(52,211,153,0.05)':'rgba(248,113,113,0.05)', borderWidth: 2, fill: true, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v=>v+' R' } } }, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx=>`  ${ctx.raw} R币` } } } }
        });
        document.getElementById('currentPrice').innerText = last;
    }
    async function addPricePoint(newPrice) { newPrice = Math.max(1, Math.round(newPrice)); priceHistory.push(newPrice); await savePriceToDB(newPrice); renderChart(); }
    async function randomFluctuation() { let last=priceHistory[priceHistory.length-1]; let change=(Math.random()-0.5)*0.2; await addPricePoint(last*(1+change)); }
    async function adjustPriceByEconomy(content) {
        let last=priceHistory[priceHistory.length-1], percent=0;
        if(content.includes('通胀')||content.includes('涨价')) percent=(Math.random()*10+5)/100;
        else if(content.includes('通缩')||content.includes('降价')) percent=-(Math.random()*10+5)/100;
        else percent=(Math.random()*4-2)/100;
        await addPricePoint(last*(1+percent));
    }
    function startAutoAdjust() { if(autoTimer) clearInterval(autoTimer); autoTimer = setInterval(()=>randomFluctuation(), 30*60*1000); }
    
    // 玩家数据 - 初始R币为3，贷款为布尔值
    async function loadPlayers() {
        try {
            const { data, error } = await supabaseClient.from('players').select('*').order('group_name').order('name');
            if(error) throw error;
            const map = new Map();
            for(const p of data) { const key=`${p.name}|${p.group_name}`; if(!map.has(key)) map.set(key,p); }
            uniquePlayers = Array.from(map.values());
            // 确保 loan 字段存在且为 boolean
            for(const p of uniquePlayers) { if(p.loan === undefined) p.loan = false; else p.loan = !!p.loan; }
            uniquePlayers.sort((a,b) => {
                if(a.group_name !== b.group_name) return a.group_name.localeCompare(b.group_name);
                return a.name.localeCompare(b.name);
            });
            setConnectionState('connected'); 
            renderUI();
        } catch(e) { 
            setConnectionState('disconnected'); 
            console.error(e);
        }
    }
    async function updatePlayer(id, updates) { 
        const { error } = await supabaseClient.from('players').update(updates).eq('id', id); 
        if(!error) { 
            await loadPlayers(); 
            showToast('已同步'); 
        } else showToast('更新失败',true); 
    }
    window.changeRbc = (p, d) => updatePlayer(p.id, { rbc: Math.max(0, p.rbc + d) });
    window.toggleLoan = (p) => updatePlayer(p.id, { loan: !p.loan });
    window.setColor = (p, c) => { if(['green','yellow','orange','red','black'].includes(c)) updatePlayer(p.id, { color: c }); };
    window.toggleStation = (p, s) => updatePlayer(p.id, { [s]: !p[s] });
    function getProgress(p) { const done = (p.s1?1:0)+(p.s2?1:0)+(p.s3?1:0)+(p.s4?1:0); return Math.round(done/4*100); }
    
    // 快报 & 经济
    async function loadLatestNews() { const { data } = await supabaseClient.from('news').select('*').order('id',{ascending:false}).limit(1); if(data?.length) { document.getElementById('latestNewsContent').innerText=data[0].content; document.getElementById('latestNewsTime').innerText=data[0].time; currentNewsId=data[0].id; document.getElementById('deleteNewsBtn').style.display='block'; } else { document.getElementById('latestNewsContent').innerText='暂无'; currentNewsId=null; document.getElementById('deleteNewsBtn').style.display='none'; } }
    async function loadLatestEconomy() { const { data } = await supabaseClient.from('economy_status').select('*').order('id',{ascending:false}).limit(1); if(data?.length) { document.getElementById('latestEconomyContent').innerText=data[0].content; document.getElementById('latestEconomyTime').innerText=data[0].time; currentEconomyId=data[0].id; document.getElementById('deleteEconomyBtn').style.display='block'; } else { document.getElementById('latestEconomyContent').innerText='暂无'; currentEconomyId=null; document.getElementById('deleteEconomyBtn').style.display='none'; } }
    async function deleteLatestNews() { if(!currentNewsId) return; const { error } = await supabaseClient.from('news').delete().eq('id', currentNewsId); if(error) showToast('删除失败',true); else { showToast('已删除快报'); await loadLatestNews(); } }
    async function deleteLatestEconomy() { if(!currentEconomyId) return; const { error } = await supabaseClient.from('economy_status').delete().eq('id', currentEconomyId); if(error) showToast('删除失败',true); else { showToast('已删除经济动态'); await loadLatestEconomy(); } }
    async function sendNews() { const content = document.getElementById('newsInput').value.trim(); if(!content) return; const timeStr = new Date().toLocaleTimeString(); const { error } = await supabaseClient.from('news').insert([{ content, time: timeStr }]); if(error) showToast('发送失败',true); else { showToast('快报已发送'); document.getElementById('newsInput').value=''; } }
    async function publishEconomy(content) { if(!content) return; const timeStr = new Date().toLocaleTimeString(); const { error } = await supabaseClient.from('economy_status').insert([{ content, time: timeStr }]); if(error) showToast('发布失败',true); else { showToast('经济动态已发布'); await adjustPriceByEconomy(content); document.getElementById('economyInput').value=''; } }
    const presetMap = { normal:"正常经济 · 甜品原价 · R币获取正常", inflation:"📈 通胀来袭！超市甜品价格上涨2R币，R币获取减半", deflation:"📉 通缩来临！超市甜品降价2R币，R币获取翻倍" };
    
    async function resetAll() { 
        if(confirm('重置所有玩家？')) { 
            for(let p of uniquePlayers) await updatePlayer(p.id, { color: 'green', rbc: 3, loan: false, s1: false, s2: false, s3: false, s4: false }); 
        } 
    }
    
    // UI渲染
    function renderStats() {
        const stats = { total: uniquePlayers.length, green:0, yellow:0, orange:0, red:0, black:0, warn:0 };
        for(let p of uniquePlayers) { 
            if(p.color==='green') stats.green++; 
            else if(p.color==='yellow') stats.yellow++; 
            else if(p.color==='orange') stats.orange++; 
            else if(p.color==='red') stats.red++; 
            else if(p.color==='black') stats.black++; 
            if(p.rbc<5) stats.warn++; 
        }
        document.getElementById('statsPanel').innerHTML = `
            <div class="stat-card ${currentColorFilter===null?'active-filter':''}" data-filter="all">👥 ${stats.total}</div>
            <div class="stat-card" data-filter="green">🟢 ${stats.green}</div>
            <div class="stat-card" data-filter="yellow">🟡 ${stats.yellow}</div>
            <div class="stat-card" data-filter="orange">🟠 ${stats.orange}</div>
            <div class="stat-card" data-filter="red">🔴 ${stats.red}</div>
            <div class="stat-card" data-filter="black">⚫ ${stats.black}</div>
            <div class="stat-card" data-filter="warn">⚠️ ${stats.warn}</div>
        `;
        document.querySelectorAll('.stat-card').forEach(c => c.addEventListener('click', () => { const f=c.getAttribute('data-filter'); currentColorFilter = (f==='all')?null:f; renderUI(); }));
    }
    function getFiltered() { 
        let f = [...uniquePlayers]; 
        if(currentGroup !== 'all') f = f.filter(p=>p.group_name === currentGroup); 
        if(currentColorFilter) { 
            if(currentColorFilter === 'warn') f = f.filter(p=>p.rbc<5); 
            else f = f.filter(p=>p.color === currentColorFilter); 
        } 
        f.sort((a,b) => {
            if(a.group_name !== b.group_name) return a.group_name.localeCompare(b.group_name);
            return a.name.localeCompare(b.name);
        });
        return f; 
    }
    function renderUI() {
        renderStats();
        document.querySelectorAll('.group-chip').forEach(chip => { 
            if(chip.getAttribute('data-group') === currentGroup) chip.classList.add('active'); 
            else chip.classList.remove('active'); 
        });
        const filtered = getFiltered();
        const tbody = document.getElementById('tableBody'); 
        tbody.innerHTML = '';
        filtered.forEach(p => {
            const row = tbody.insertRow(); 
            if(p.rbc<5) row.classList.add('warning-row');
            row.insertCell(0).innerText = p.name;
            row.insertCell(1).innerText = p.group_name;
            
            // 颜色选择器（增强外发光效果）
            const colorCell = row.insertCell(2);
            const colors = ['green','yellow','orange','red','black'];
            const cDiv = document.createElement('div'); 
            cDiv.className = 'color-selector';
            colors.forEach(c => { 
                const dot = document.createElement('div'); 
                dot.className = `color-dot dot-${c}`; 
                if(p.color === c) dot.classList.add('active-dot'); 
                dot.addEventListener('click', ()=>window.setColor(p,c)); 
                cDiv.appendChild(dot); 
            });
            colorCell.appendChild(cDiv);
            
            // R币控制
            const rbcCell = row.insertCell(3);
            const rbDiv = document.createElement('div'); 
            rbDiv.className = 'rbc-control';
            rbDiv.innerHTML = `<button class="rbc-btn">-5</button><button class="rbc-btn">-2</button><button class="rbc-btn">-1</button><span style="min-width:50px;">${p.rbc}</span><button class="rbc-btn">+1</button><button class="rbc-btn">+2</button><button class="rbc-btn">+5</button>`;
            const btns = rbDiv.children;
            btns[0].onclick = () => window.changeRbc(p,-5); 
            btns[1].onclick = () => window.changeRbc(p,-2); 
            btns[2].onclick = () => window.changeRbc(p,-1);
            btns[4].onclick = () => window.changeRbc(p,1); 
            btns[5].onclick = () => window.changeRbc(p,2); 
            btns[6].onclick = () => window.changeRbc(p,5);
            rbcCell.appendChild(rbDiv);
            
            // 贷款复选框
            const loanCell = row.insertCell(4);
            const loanCheck = document.createElement('input');
            loanCheck.type = 'checkbox';
            loanCheck.className = 'loan-checkbox';
            loanCheck.checked = p.loan === true;
            loanCheck.addEventListener('change', () => window.toggleLoan(p));
            loanCell.appendChild(loanCheck);
            
            const createCheck = (s,chk) => { const cb = document.createElement('input'); cb.type='checkbox'; cb.checked=chk; cb.onchange = () => window.toggleStation(p,s); return cb; };
            row.insertCell(5).appendChild(createCheck('s1',p.s1));
            row.insertCell(6).appendChild(createCheck('s2',p.s2));
            row.insertCell(7).appendChild(createCheck('s3',p.s3));
            row.insertCell(8).appendChild(createCheck('s4',p.s4));
            row.insertCell(9).innerHTML = `<span style="background:var(--surface-4); padding:4px 8px; border-radius:40px;">${getProgress(p)}%</span>`;
        });
    }
    
    // 在 Supabase 中为 players 表添加 loan 列（如果尚未添加）
    async function ensureLoanColumn() {
        // 此函数仅作提示，实际需在 Supabase SQL 中手动执行：
        // ALTER TABLE players ADD COLUMN IF NOT EXISTS loan BOOLEAN DEFAULT FALSE;
        // 如果未添加，前端仍可使用临时状态，但刷新后可能丢失。
        const sample = uniquePlayers[0];
        if(sample && sample.loan === undefined) {
            console.warn("提示：数据库 players 表中没有 'loan' 列，贷款状态不会持久化。请执行 SQL: ALTER TABLE players ADD COLUMN loan BOOLEAN DEFAULT FALSE;");
        }
    }
    
    function setupRealtime() {
        supabaseClient.channel('players').on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadPlayers()).subscribe();
        supabaseClient.channel('news').on('postgres_changes', { event: '*', schema: 'public', table: 'news' }, () => loadLatestNews()).subscribe();
        supabaseClient.channel('economy').on('postgres_changes', { event: '*', schema: 'public', table: 'economy_status' }, () => loadLatestEconomy()).subscribe();
        supabaseClient.channel('stock').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'stock_prices' }, (payload) => {
            if(payload.new.price && priceHistory[priceHistory.length-1] !== payload.new.price) { priceHistory.push(payload.new.price); renderChart(); }
        }).subscribe();
    }
    
    // 事件绑定
    document.getElementById('sendNewsBtn')?.addEventListener('click', sendNews);
    document.getElementById('setEconomyBtn')?.addEventListener('click', () => { const custom = document.getElementById('economyInput').value.trim(); if(custom) publishEconomy(custom); else showToast('请输入经济动态内容',true); });
    document.getElementById('deleteNewsBtn')?.addEventListener('click', deleteLatestNews);
    document.getElementById('deleteEconomyBtn')?.addEventListener('click', deleteLatestEconomy);
    document.getElementById('clearFilterBtn')?.addEventListener('click', () => { currentColorFilter = null; renderUI(); });
    document.getElementById('resetAllBtn')?.addEventListener('click', resetAll);
    document.getElementById('addRandomPriceBtn')?.addEventListener('click', randomFluctuation);
    document.getElementById('syncEconomyBtn')?.addEventListener('click', async () => { const econ = document.getElementById('latestEconomyContent').innerText; if(econ && econ !== '暂无') await adjustPriceByEconomy(econ); else showToast('暂无经济动态',true); });
    document.getElementById('manualSetPriceBtn')?.addEventListener('click', async () => { const val = parseFloat(document.getElementById('manualPriceInput').value); if(isNaN(val)) showToast('请输入有效数字',true); else await addPricePoint(val); document.getElementById('manualPriceInput').value = ''; });
    document.querySelectorAll('.quick-btn').forEach(btn => { btn.addEventListener('click', () => { const preset = btn.getAttribute('data-preset'); if(preset && presetMap[preset]) document.getElementById('economyInput').value = presetMap[preset]; }); });
    document.querySelectorAll('.group-chip').forEach(chip => { chip.addEventListener('click', () => { currentGroup = chip.getAttribute('data-group'); renderUI(); }); });
    
    initPriceHistory();
    startAutoAdjust();
    loadPlayers();
    loadLatestNews();
    loadLatestEconomy();
    setupRealtime();
    setTimeout(ensureLoanColumn, 1000);
})();
</script>
</body>
</html>
