<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RE:Ignite | 娱乐区</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f4f5f7;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px) saturate(1.5);
            border-radius: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.7);
        }
        h1 { font-size: 1.5rem; color: #111827; }
        h1 span { color: #e8501a; }
        
        .timer-section {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 6px 16px 6px 20px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .timer-label { color: #6b7280; font-size: 0.7rem; letter-spacing: 1px; font-weight: 500; }
        .timer-display { font-family: monospace; font-size: 1.6rem; font-weight: 700; color: #e8501a; background: white; padding: 4px 12px; border-radius: 40px; }
        .timer-reset-btn { background: #f3f4f6; border: none; border-radius: 40px; padding: 6px 14px; font-size: 0.7rem; cursor: pointer; }
        .timer-warning { color: #f97316; font-size: 0.7rem; font-weight: 600; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
        
        .status-pill { display: flex; align-items: center; gap: 8px; padding: 4px 14px; border-radius: 40px; font-size: 0.7rem; background: #e8f5e9; color: #2e7d32; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #059669; }
        
        .filter-bar {
            background: white;
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #e5e7eb;
        }
        .group-chip { padding: 5px 16px; border-radius: 40px; background: #f3f4f6; cursor: pointer; font-size: 0.8rem; }
        .group-chip.active { background: #e8501a; color: white; }
        
        .table-wrapper {
            background: white;
            border-radius: 24px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #edf2f7; font-size: 0.85rem; }
        th { background: #f9fafb; color: #4b5563; font-weight: 600; }
        .warning-row { background: #ffebee; }
        
        .loan-control, .rbc-control { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .rbc-btn, .loan-btn { background: #f3f4f6; border: none; width: 44px; height: 40px; border-radius: 40px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        .rbc-btn.plus { background: #e0f2fe; color: #0284c7; }
        .rbc-btn.minus { background: #fee2e2; color: #dc2626; }
        .loan-btn { background: #e0e7ff; color: #1e3a8a; }
        
        .player-name { font-weight: 600; }
        .group-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; background: #e5e7eb; }
        
        .toast-msg { position: fixed; bottom: 30px; right: 30px; background: #1f2937; color: white; padding: 8px 16px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; font-size: 0.8rem; }
        .timer-notify { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #e8501a; color: white; padding: 10px 20px; border-radius: 60px; font-weight: 600; font-size: 0.8rem; z-index: 1001; opacity: 0; transition: 0.3s; white-space: nowrap; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>🎮 RE:Ignite <span>| 娱乐区</span></h1>
            <div style="font-size: 0.7rem; color: #6b7280; margin-top: 4px;">R币增减 · 贷款管理 · 自动记录日志</div>
        </div>
        <div class="timer-section">
            <span class="timer-label">⏰ 工作倒计时</span>
            <span class="timer-display" id="timerDisplay">15:00</span>
            <button class="timer-reset-btn" id="resetTimerBtn">⟳</button>
            <span id="timerWarning" class="timer-warning" style="display: none;">⚠️ 最后5分钟</span>
        </div>
        <div class="status-pill"><span class="status-dot"></span>实时在线</div>
    </div>

    <div class="filter-bar">
        <div id="groupFilter" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
    </div>

    <div class="table-wrapper">
        <table id="playerTable">
            <thead>
                <tr><th>#</th><th>玩家</th><th>组别</th><th>贷款</th><th>当前R币</th><th colspan="6">调整R币</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
<div class="toast-msg" id="toastMsg"></div>
<div class="timer-notify" id="timerNotify">⏰ 15分钟工作节结束！</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
    const SUPABASE_URL = "https://vycanjsrmxdlnxauqvtc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Y2FuanNybXhkbG54YXVxdnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mjk2ODcsImV4cCI6MjA5MzIwNTY4N30.NAGbSNYe_7-mcvvpFeBODeHEM59IHqoWKY-RaX5jU6c";
    let supabase = window.__supabaseStation || (window.__supabaseStation = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
    let allPlayers = [];
    let currentGroup = "all";
    
    // 倒计时
    let timerInterval = null;
    let remainingSeconds = 15 * 60;
    function formatTime(seconds) { let mins = Math.floor(seconds/60); let secs = seconds%60; return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; }
    function showTimerNotify(msg) { const n=document.getElementById('timerNotify'); n.innerText=msg; n.style.opacity='1'; setTimeout(()=>n.style.opacity='0',3000); }
    function updateTimerDisplay() {
        const disp=document.getElementById('timerDisplay'); const warn=document.getElementById('timerWarning');
        if(disp) disp.innerText=formatTime(remainingSeconds);
        if(remainingSeconds<=5*60 && remainingSeconds>0) warn.style.display='inline-block';
        else warn.style.display='none';
        if(remainingSeconds<=0) { if(timerInterval) clearInterval(timerInterval); disp.innerText='00:00'; showTimerNotify('⏰ 15分钟工作节结束！'); }
    }
    function startTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=setInterval(()=>{ if(remainingSeconds>0){ remainingSeconds--; updateTimerDisplay(); } else clearInterval(timerInterval); },1000); }
    function resetTimer() { remainingSeconds=15*60; updateTimerDisplay(); startTimer(); showTimerNotify('⟳ 倒计时已重置为 15:00'); }
    
    function showToast(msg) { const t=document.getElementById('toastMsg'); t.innerText=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }

    // 日志记录（贷款详情）
    async function logRbcAction(playerId, oldVal, newVal, delta) {
        try {
            await supabase.from('player_logs').insert([{
                player_id: playerId, action_type: 'rbc_change', old_value: String(oldVal), new_value: String(newVal),
                detail: `[站3-娱乐区] ${delta>0 ? '+' : ''}${delta} R币`
            }]);
        } catch(e) { console.warn('日志记录失败:', e); }
    }
    async function logLoanAction(playerId, oldVal, newVal, delta) {
        try {
            await supabase.from('player_logs').insert([{
                player_id: playerId, action_type: 'loan_change', old_value: String(oldVal), new_value: String(newVal),
                detail: `[站3-娱乐区] 贷款${delta>0 ? '发放' : '还款'} ${Math.abs(delta)} R币，总额 ${newVal}`
            }]);
        } catch(e) { console.warn('日志记录失败:', e); }
    }

    async function loadPlayers() {
        const { data, error } = await supabase.from('players').select('*').order('id');
        if(!error && data) { 
            allPlayers = data;
            for(let p of allPlayers) if(p.loan === undefined) p.loan = 0;
            renderUI(); 
        }
    }

    async function updatePlayerRbc(player, delta) {
        const newRbc = Math.max(0, player.rbc + delta);
        await supabase.from('players').update({ rbc: newRbc }).eq('id', player.id);
        await logRbcAction(player.id, player.rbc, newRbc, delta);
        await loadPlayers();
        showToast(`${player.name} R币: ${player.rbc} → ${newRbc}`);
    }

    async function adjustLoan(player, delta) {
        const newLoan = Math.max(0, (player.loan || 0) + delta);
        await supabase.from('players').update({ loan: newLoan }).eq('id', player.id);
        await logLoanAction(player.id, player.loan || 0, newLoan, delta);
        await loadPlayers();
        showToast(`${player.name} 贷款${delta>0 ? '增加' : '减少'} ${Math.abs(delta)} R币，当前总额 ${newLoan}`);
    }

    function renderUI() {
        let filtered = currentGroup === "all" ? allPlayers : allPlayers.filter(p => p.group_name === currentGroup);
        const groups = [...new Set(allPlayers.map(p=>p.group_name))];
        document.getElementById('groupFilter').innerHTML = `<span class="group-chip ${currentGroup==='all'?'active':''}" data-group="all">全部</span>` + groups.map(g => `<span class="group-chip ${currentGroup===g?'active':''}" data-group="${g}">${g}</span>`).join('');
        document.querySelectorAll('.group-chip').forEach(chip => chip.onclick = () => { currentGroup = chip.getAttribute('data-group'); renderUI(); });
        
        const tbody = document.getElementById('tableBody'); tbody.innerHTML='';
        filtered.forEach(p => {
            const row = tbody.insertRow(); if(p.rbc<5) row.classList.add('warning-row');
            row.insertCell(0).innerText = p.id;
            row.insertCell(1).innerHTML = `<span class="player-name">${p.name}</span>`;
            row.insertCell(2).innerHTML = `<span class="group-badge">${p.group_name}</span>`;
            
            // 贷款控件（整数累计，±20）
            const loanCell = row.insertCell(3);
            const loanDiv = document.createElement('div');
            loanDiv.className = 'loan-control';
            const currentLoan = p.loan || 0;
            loanDiv.innerHTML = `
                <button class="loan-btn">-20</button>
                <span style="min-width:50px; display:inline-block; text-align:center;">${currentLoan}</span>
                <button class="loan-btn">+20</button>
            `;
            loanDiv.querySelectorAll('button')[0].onclick = (e) => { e.stopPropagation(); adjustLoan(p, -20); };
            loanDiv.querySelectorAll('button')[1].onclick = (e) => { e.stopPropagation(); adjustLoan(p, 20); };
            loanCell.appendChild(loanDiv);
            
            row.insertCell(4).innerHTML = `<strong style="font-size:1.1rem;">${p.rbc}</strong>`;
            
            const actionCell = row.insertCell(5);
            actionCell.colSpan = 6;
            const btnContainer = document.createElement('div');
            btnContainer.className = 'rbc-control';
            const buttons = [
                { val: -5, class: 'minus' }, { val: -2, class: 'minus' }, { val: -1, class: 'minus' },
                { val: 1, class: 'plus' }, { val: 2, class: 'plus' }, { val: 5, class: 'plus' }
            ];
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.innerText = btn.val > 0 ? `+${btn.val}` : `${btn.val}`;
                button.className = `rbc-btn ${btn.class}`;
                button.onclick = () => updatePlayerRbc(p, btn.val);
                btnContainer.appendChild(button);
            });
            actionCell.appendChild(btnContainer);
        });
    }

    loadPlayers();
    supabase.channel('players-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadPlayers())
        .subscribe();
    
    startTimer();
    document.getElementById('resetTimerBtn').addEventListener('click', resetTimer);
})();
</script>
</body>
</html>
