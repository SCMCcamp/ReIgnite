<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RE:Ignite | 娱乐区</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f4f5f7;
            padding: 16px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px) saturate(1.5);
            border-radius: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.7);
        }
        .title-section {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 { font-size: 1.3rem; color: #111827; }
        h1 span { color: #e8501a; }
        
        .status-indicator { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.05); padding: 4px 10px; border-radius: 40px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; transition: all 0.2s; }
        .status-connecting { background: #f97316; box-shadow: 0 0 4px #f97316; animation: pulse 1.2s infinite; }
        .status-connected { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
        .status-disconnected { background: #ef4444; box-shadow: 0 0 4px #ef4444; }
        .status-text { font-size: 0.65rem; color: #6b7280; }
        
        @keyframes pulse { 0%,100% { opacity: 0.6; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } }
        
        .timer-section {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 5px 12px 5px 16px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .timer-label { color: #6b7280; font-size: 0.65rem; font-weight: 500; }
        .timer-display { font-family: monospace; font-size: 1.3rem; font-weight: 700; color: #e8501a; background: white; padding: 2px 10px; border-radius: 40px; }
        .timer-reset-btn { background: #f3f4f6; border: none; border-radius: 40px; padding: 4px 10px; font-size: 0.65rem; cursor: pointer; }
        .timer-warning { color: #f97316; font-size: 0.65rem; font-weight: 600; animation: pulse 1s infinite; }
        
        .filter-bar {
            background: white;
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid #e5e7eb;
        }
        .group-chip-container { display: flex; gap: 6px; flex-wrap: wrap; }
        .group-chip { padding: 4px 12px; border-radius: 40px; background: #f3f4f6; cursor: pointer; font-size: 0.75rem; white-space: nowrap; }
        .group-chip.active { background: #e8501a; color: white; }
        
        .table-wrapper {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th, td { padding: 10px 8px; text-align: center; border-bottom: 1px solid #edf2f7; font-size: 0.75rem; }
        th { background: #f9fafb; color: #4b5563; font-weight: 600; }
        .warning-row { background: #ffebee; }
        
        .loan-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #e8501a; }
        
        .rbc-control { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
        .rbc-btn {
            background: #f3f4f6;
            border: none;
            width: 38px;
            height: 34px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .rbc-btn.plus { background: #e0f2fe; color: #0284c7; }
        .rbc-btn.minus { background: #fee2e2; color: #dc2626; }
        
        .player-name { font-weight: 600; }
        .group-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.65rem; background: #e5e7eb; }
        
        .toast-msg { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 6px 12px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; font-size: 0.7rem; }
        .timer-notify { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #e8501a; color: white; padding: 10px 20px; border-radius: 60px; font-weight: 600; font-size: 0.8rem; z-index: 1001; opacity: 0; transition: 0.3s; white-space: nowrap; }
        
        @media (max-width: 640px) {
            body { padding: 12px; }
            .header { padding: 10px 12px; }
            h1 { font-size: 1.1rem; }
            .timer-display { font-size: 1rem; padding: 2px 8px; }
            .rbc-btn { width: 34px; height: 30px; font-size: 0.7rem; }
            th, td { padding: 8px 4px; font-size: 0.7rem; }
            .loan-checkbox { width: 16px; height: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title-section">
            <h1>🎮 RE:Ignite <span>| 娱乐区</span></h1>
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">连接中</span>
            </div>
        </div>
        <div class="timer-section">
            <span class="timer-label">⏰ 工作倒计时</span>
            <span class="timer-display" id="timerDisplay">15:00</span>
            <button class="timer-reset-btn" id="resetTimerBtn">⟳</button>
            <span id="timerWarning" class="timer-warning" style="display: none;">⚠️</span>
        </div>
    </div>

    <div class="filter-bar">
        <div class="group-chip-container" id="groupFilter"></div>
    </div>

    <div class="table-wrapper">
        <table id="playerTable">
            <thead><tr><th>#</th><th>玩家</th><th>组别</th><th>贷款</th><th>R币</th><th colspan="6">调整R币</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
<div class="toast-msg" id="toastMsg"></div>
<div class="timer-notify" id="timerNotify">⏰ 15分钟工作节结束！</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
    const SUPABASE_URL = "https://vycanjsrmxdlnxauqvtc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5Y2FuanNybXhkbG54YXVxdnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Mjk2ODcsImV4cCI6MjA5MzIwNTY4N30.NAGbSNYe_7-mcvvpFeBODeHEM59IHqoWKY-RaX5jU6c";
    let supabase = window.__supabaseStation || (window.__supabaseStation = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
    let allPlayers = [];
    let currentGroup = "all";
    
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    
    function setConnectionState(state) {
        statusDot.className = 'status-dot';
        if (state === 'connected') {
            statusDot.classList.add('status-connected');
            statusText.innerText = '已连接';
        } else if (state === 'connecting') {
            statusDot.classList.add('status-connecting');
            statusText.innerText = '连接中';
        } else {
            statusDot.classList.add('status-disconnected');
            statusText.innerText = '失联';
        }
    }
    
    let timerInterval = null;
    let remainingSeconds = 15 * 60;
    
    function formatTime(seconds) {
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    function showTimerNotify(message) {
        const notify = document.getElementById('timerNotify');
        notify.innerText = message;
        notify.style.opacity = '1';
        setTimeout(() => { notify.style.opacity = '0'; }, 3000);
    }
    
    function updateTimerDisplay() {
        const display = document.getElementById('timerDisplay');
        const warning = document.getElementById('timerWarning');
        if (display) display.innerText = formatTime(remainingSeconds);
        if (remainingSeconds <= 5 * 60 && remainingSeconds > 0) warning.style.display = 'inline-block';
        else warning.style.display = 'none';
        if (remainingSeconds <= 0) {
            if (timerInterval) clearInterval(timerInterval);
            display.innerText = '00:00';
            showTimerNotify('⏰ 15分钟工作节结束！');
        }
    }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (remainingSeconds > 0) { remainingSeconds--; updateTimerDisplay(); }
            else clearInterval(timerInterval);
        }, 1000);
    }
    
    function resetTimer() {
        remainingSeconds = 15 * 60;
        updateTimerDisplay();
        startTimer();
        showTimerNotify('⟳ 倒计时已重置为 15:00');
    }
    
    function showToast(msg) { const t=document.getElementById('toastMsg'); t.innerText=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }

    async function logRbcAction(playerId, oldVal, newVal, delta) {
        try {
            await supabase.from('player_logs').insert([{
                player_id: playerId, action_type: 'rbc_change', old_value: String(oldVal), new_value: String(newVal),
                detail: `[站3-娱乐区] ${delta>0 ? '+' : ''}${delta} R币`
            }]);
        } catch(e) { console.warn('日志记录失败:', e); }
    }

    async function logLoanAction(playerId, oldVal, newVal) {
        try {
            await supabase.from('player_logs').insert([{
                player_id: playerId, action_type: 'loan_change', old_value: String(oldVal), new_value: String(newVal),
                detail: `[站3-娱乐区] 贷款 ${newVal === 'true' ? '启用' : '取消'}`
            }]);
        } catch(e) { console.warn('日志记录失败:', e); }
    }

    async function loadPlayers() {
        setConnectionState('connecting');
        try {
            const { data, error } = await supabase.from('players').select('*').order('id');
            if (error) throw error;
            allPlayers = data;
            for(let p of allPlayers) if(p.loan === undefined) p.loan = false;
            setConnectionState('connected');
            renderUI();
        } catch(e) {
            console.error(e);
            setConnectionState('disconnected');
        }
    }

    async function updatePlayerRbc(player, delta) {
        const newRbc = Math.max(0, player.rbc + delta);
        await supabase.from('players').update({ rbc: newRbc }).eq('id', player.id);
        await logRbcAction(player.id, player.rbc, newRbc, delta);
        await loadPlayers();
        showToast(`${player.name} R币: ${player.rbc} → ${newRbc}`);
    }

    async function toggleLoan(player) {
        const newLoan = !player.loan;
        await supabase.from('players').update({ loan: newLoan }).eq('id', player.id);
        await logLoanAction(player.id, player.loan, newLoan);
        await loadPlayers();
        showToast(`${player.name} 贷款 ${newLoan ? '已启用' : '已取消'}`);
    }

    function renderUI() {
        let filtered = currentGroup === "all" ? allPlayers : allPlayers.filter(p => p.group_name === currentGroup);
        const groups = [...new Set(allPlayers.map(p=>p.group_name))];
        document.getElementById('groupFilter').innerHTML = `<div class="group-chip ${currentGroup==='all'?'active':''}" data-group="all">全部</div>` + groups.map(g => `<div class="group-chip ${currentGroup===g?'active':''}" data-group="${g}">${g}</div>`).join('');
        document.querySelectorAll('.group-chip').forEach(chip => chip.onclick = () => { currentGroup = chip.getAttribute('data-group'); renderUI(); });
        
        const tbody = document.getElementById('tableBody'); tbody.innerHTML='';
        filtered.forEach(p => {
            const row = tbody.insertRow(); if(p.rbc<5) row.classList.add('warning-row');
            row.insertCell(0).innerText = p.id;
            row.insertCell(1).innerHTML = `<span class="player-name">${p.name}</span>`;
            row.insertCell(2).innerHTML = `<span class="group-badge">${p.group_name}</span>`;
            const loanCell = row.insertCell(3);
            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.className = 'loan-checkbox';
            chk.checked = p.loan === true;
            chk.onclick = (e) => { e.stopPropagation(); toggleLoan(p); };
            loanCell.appendChild(chk);
            row.insertCell(4).innerHTML = `<strong>${p.rbc}</strong>`;
            const actionCell = row.insertCell(5);
            actionCell.colSpan = 6;
            const btnContainer = document.createElement('div');
            btnContainer.className = 'rbc-control';
            const buttons = [
                { val: -5, class: 'minus' }, { val: -2, class: 'minus' }, { val: -1, class: 'minus' },
                { val: 1, class: 'plus' }, { val: 2, class: 'plus' }, { val: 5, class: 'plus' }
            ];
            buttons.forEach(btn => {
                const button = document.createElement('button');
                button.innerText = btn.val > 0 ? `+${btn.val}` : `${btn.val}`;
                button.className = `rbc-btn ${btn.class}`;
                button.onclick = () => updatePlayerRbc(p, btn.val);
                btnContainer.appendChild(button);
            });
            actionCell.appendChild(btnContainer);
        });
    }

    loadPlayers();
    supabase.channel('players-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => loadPlayers())
        .subscribe();
    
    startTimer();
    document.getElementById('resetTimerBtn').addEventListener('click', resetTimer);
})();
</script>
</body>
</html>
